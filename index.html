<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>War map of Westeros</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #0f0c08;
    font-family: 'Georgia', serif;
    color: #e8d9b8;
  }

  /* ── Map (left side) ───────────────────────────── */
  #map-wrap {
    position: fixed;
    left: 0; top: 0; bottom: 0;
    right: 300px;   /* оставляем место для панели справа */
    cursor: grab;
    overflow: hidden;
    background: #1c3a5a;
  }
  #map-wrap.grabbing { cursor: grabbing !important; }

  #svg-container {
    width: 100%; height: 100%;
  }
  #svg-container > svg {
    width: 100%; height: 100%;
    display: block;
    /* no CSS transform — we manipulate viewBox directly → no blur */
  }

  /* ── Floating header ───────────────────────────── */
  .header {
    position: fixed;
    top: 14px;
    left: 0;
    right: 300px;  /* не заходим на панель справа */
    z-index: 51;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    pointer-events: none;
    white-space: nowrap;
  }
  h1 {
    font-size: 1.9em;
    color: #d4a857;
    text-shadow: 0 0 12px #000, 2px 2px 4px #000;
    letter-spacing: 3px;
  }
  .logo {
    height: 52px;
    width: auto;
    filter: drop-shadow(0 0 6px rgba(0,0,0,0.9));
  }

  /* ── Right sidebar info panel ──────────────────── */
  #info {
    position: fixed;
    right: 0; top: 0; bottom: 0;
    width: 300px;
    overflow-y: auto;
    background: rgba(12, 22, 38, 0.97);
    border-left: 2px solid #d4a857;
    padding: 100px 20px 24px 20px;
    box-shadow: -4px 0 24px rgba(0,0,0,0.6);
    z-index: 50;
  }
  #info h2 { color: #d4a857; font-size: 1.35em; border-bottom: 1px solid #2a4060; padding-bottom: 6px; margin-bottom: 12px; }
  #info .sigil-img {
    display: block;
    width: 120px;
    height: 120px;
    object-fit: contain;
    margin: 0 auto 14px auto;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.7));
  }
  #info p { line-height: 1.65; margin-bottom: 10px; font-size: 0.91em; color: #d0c8b8; }
  #info .field { margin-top: 9px; font-size: 0.9em; color: #c8bca8; }
  #info .field b { color: #d4a857; }
  .placeholder { color: #4a6a8a; font-style: italic; text-align: center; margin-top: 80px; font-size: 0.95em; line-height: 1.8; }

  /* ── Region highlight ──────────────────────────── */
  .clickable { cursor: pointer; }
  .clickable path, .clickable polygon,
  .clickable.active, .clickable.active path, .clickable.active polygon {
    transition: filter 0.35s ease;
  }

  /* Generic fallback */
  .clickable:hover, .clickable:hover path, .clickable:hover polygon {
    filter: brightness(0.92) sepia(0.5) saturate(1.6) hue-rotate(5deg);
  }
  .clickable.active, .clickable.active path, .clickable.active polygon {
    filter: brightness(0.85) sepia(0.65) saturate(2) hue-rotate(5deg);
  }

  /* ── Цвета по королевствам ─────────────────────────────
     hover: очень мягко    active: чуть насыщеннее
  ── */

  /* Земли за Стеной — ледяной голубой */
  #beyond-the-wall:hover, #beyond-the-wall:hover path, #beyond-the-wall:hover polygon { filter: brightness(1.02) sepia(0.55) saturate(1.4) hue-rotate(175deg); }
  #beyond-the-wall.active, #beyond-the-wall.active path, #beyond-the-wall.active polygon { filter: brightness(0.92) sepia(0.7) saturate(1.8) hue-rotate(175deg); }

  /* Север — серо-стальной, Старки */
  #north:hover, #north:hover path, #north:hover polygon { filter: brightness(0.90) sepia(0.55) saturate(1.3) hue-rotate(185deg); }
  #north.active, #north.active path, #north.active polygon { filter: brightness(0.82) sepia(0.7) saturate(1.7) hue-rotate(185deg); }

  /* Железные острова — холодный серый, Грейджой */
  #iron-islands:hover, #iron-islands:hover path, #iron-islands:hover polygon { filter: brightness(0.85) grayscale(0.7) sepia(0.15) saturate(0.6); }
  #iron-islands.active, #iron-islands.active path, #iron-islands.active polygon { filter: brightness(0.75) grayscale(0.8) sepia(0.1) saturate(0.4); }

  /* Западные земли — тёмно-красный */
  #westerlands:hover, #westerlands:hover path, #westerlands:hover polygon { filter: brightness(0.82) sepia(0.85) saturate(2.5) hue-rotate(322deg); }
  #westerlands.active, #westerlands.active path, #westerlands.active polygon { filter: brightness(0.70) sepia(1.0) saturate(3.2) hue-rotate(322deg); }

  /* Речные земли — голубой, Талли */
  #riverlands:hover, #riverlands:hover path, #riverlands:hover polygon { filter: brightness(0.90) sepia(0.55) saturate(1.6) hue-rotate(163deg); }
  #riverlands.active, #riverlands.active path, #riverlands.active polygon { filter: brightness(0.82) sepia(0.7) saturate(2) hue-rotate(163deg); }

  /* Долина Аррен — небесно-голубой */
  #vale:hover, #vale:hover path, #vale:hover polygon { filter: brightness(0.92) sepia(0.55) saturate(1.5) hue-rotate(188deg); }
  #vale.active, #vale.active path, #vale.active polygon { filter: brightness(0.84) sepia(0.7) saturate(1.9) hue-rotate(188deg); }

  /* Королевские земли — тёмно-красный */
  #crownlands:hover, #crownlands:hover path, #crownlands:hover polygon { filter: brightness(0.82) sepia(0.85) saturate(2.5) hue-rotate(330deg); }
  #crownlands.active, #crownlands.active path, #crownlands.active polygon { filter: brightness(0.70) sepia(1.0) saturate(3.2) hue-rotate(330deg); }

  /* Штормовые земли — как дорн был (8deg, оранжеватый) */
  #stormlands:hover, #stormlands:hover path, #stormlands:hover polygon { filter: brightness(0.92) sepia(0.7) saturate(2.2) hue-rotate(8deg); }
  #stormlands.active, #stormlands.active path, #stormlands.active polygon { filter: brightness(0.82) sepia(0.85) saturate(2.8) hue-rotate(8deg); }

  /* Простор — как штормовые были (28deg, зеленовато-жёлтый) */
  #reach:hover, #reach:hover path, #reach:hover polygon { filter: brightness(0.92) sepia(0.6) saturate(2.2) hue-rotate(28deg); }
  #reach.active, #reach.active path, #reach.active polygon { filter: brightness(0.84) sepia(0.75) saturate(2.8) hue-rotate(28deg); }

  /* Дорн — Мартелловский оранжевый */
  #dorne:hover, #dorne:hover path, #dorne:hover polygon { filter: brightness(0.90) sepia(0.85) saturate(3.5) hue-rotate(355deg); }
  #dorne.active, #dorne.active path, #dorne.active polygon { filter: brightness(0.78) sepia(1.0) saturate(4.5) hue-rotate(355deg); }

  /* Браавос — тёмно-фиолетовый */
  #braavos:hover, #braavos:hover path, #braavos:hover polygon { filter: brightness(0.85) sepia(0.7) saturate(2.5) hue-rotate(232deg); }
  #braavos.active, #braavos.active path, #braavos.active polygon { filter: brightness(0.72) sepia(0.85) saturate(3.2) hue-rotate(232deg); }

  /* ── Admin button ──────────────────────────────────── */
  #admin-btn {
    position: fixed;
    bottom: 16px; right: 16px;
    z-index: 200;
    width: 38px; height: 38px;
    background: rgba(10,20,35,0.88);
    border: 1px solid #2a4060;
    border-radius: 50%;
    color: #3a5a7a;
    font-size: 1.1em;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
    padding: 0;
  }
  #admin-btn:hover { border-color: #d4a857; color: #d4a857; background: rgba(20,35,55,0.97); }

  /* ── Password modal ────────────────────────────────── */
  #pw-modal {
    display: none; position: fixed; inset: 0; z-index: 400;
    background: rgba(0,0,0,0.72);
    align-items: center; justify-content: center;
  }
  #pw-modal.open { display: flex; }
  #pw-box {
    background: #0b1825;
    border: 2px solid #d4a857;
    border-radius: 10px;
    padding: 34px 30px 26px;
    min-width: 300px;
    text-align: center;
    box-shadow: 0 8px 40px rgba(0,0,0,0.8);
  }
  #pw-box h3 { color: #d4a857; font-size: 1.05em; letter-spacing: 2px; margin-bottom: 20px; }
  #pw-input {
    width: 100%;
    background: #071018;
    border: 1px solid #2a4060;
    border-radius: 5px;
    color: #e8d9b8;
    padding: 10px 13px;
    font-size: 1em;
    font-family: monospace;
    outline: none;
    margin-bottom: 8px;
    letter-spacing: 2px;
  }
  #pw-input:focus { border-color: #d4a857; }
  #pw-error { color: #c0392b; font-size: 0.83em; min-height: 1.3em; margin-bottom: 10px; }
  .pw-row { display: flex; gap: 10px; }
  .pw-row button {
    flex: 1; padding: 10px; border-radius: 5px;
    border: none; cursor: pointer;
    font-family: 'Georgia', serif; font-size: 0.92em;
    transition: background 0.15s;
  }
  #pw-ok { background: #d4a857; color: #0a1520; font-weight: bold; }
  #pw-ok:hover { background: #e8c06a; }
  #pw-cancel { background: #162235; color: #7a9ab8; border: 1px solid #2a4060; }
  #pw-cancel:hover { background: #1e3048; }

  /* ── Admin panel ───────────────────────────────────── */
  #admin-panel {
    display: none; position: fixed; inset: 0; z-index: 300;
    background: rgba(0,0,0,0.6);
    align-items: flex-start; justify-content: center;
    overflow-y: auto; padding: 36px 20px 60px;
  }
  #admin-panel.open { display: flex; }
  #admin-inner {
    background: #0b1825;
    border: 2px solid #d4a857;
    border-radius: 10px;
    width: 100%; max-width: 680px;
    padding: 28px 30px;
    position: relative;
    box-shadow: 0 8px 40px rgba(0,0,0,0.8);
  }
  #admin-inner > h2 {
    color: #d4a857; font-size: 1.1em; letter-spacing: 3px;
    text-align: center; margin-bottom: 22px;
    border-bottom: 1px solid #1e3a55; padding-bottom: 14px;
  }
  #admin-close {
    position: absolute; top: 14px; right: 16px;
    background: none; border: none; color: #4a6a8a;
    font-size: 1.4em; cursor: pointer; line-height: 1; padding: 2px 6px;
    border-radius: 4px; transition: color 0.15s;
  }
  #admin-close:hover { color: #d4a857; }
  #region-select {
    width: 100%;
    background: #071018; border: 1px solid #2a4060; border-radius: 5px;
    color: #e8d9b8; padding: 9px 12px;
    font-size: 0.95em; font-family: 'Georgia', serif;
    margin-bottom: 22px; outline: none; cursor: pointer;
  }
  #region-select:focus { border-color: #d4a857; }
  .af {
    margin-bottom: 13px;
  }
  .af label {
    display: block; color: #8aabca; font-size: 0.75em;
    letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 5px;
  }
  .af input, .af textarea, .af select {
    width: 100%;
    background: #071018; border: 1px solid #2a4060; border-radius: 5px;
    color: #e8d9b8; padding: 8px 12px;
    font-size: 0.92em; font-family: 'Georgia', serif;
    outline: none; resize: vertical;
    transition: border-color 0.15s;
  }
  .af input:focus, .af textarea:focus, .af select:focus { border-color: #d4a857; }
  .af textarea { min-height: 72px; }
  #af-img-preview {
    display: none; width: 76px; height: 76px;
    object-fit: contain; margin-top: 8px;
    border: 1px solid #2a4060; border-radius: 5px;
    background: #040c14;
  }
  .af-row { display: grid; grid-template-columns: 1fr 1fr; gap: 13px; }
  .admin-actions { display: flex; gap: 12px; margin-top: 22px; }
  .admin-actions button {
    flex: 1; padding: 11px; border-radius: 5px; border: none;
    cursor: pointer; font-family: 'Georgia', serif; font-size: 0.95em;
    font-weight: bold; transition: background 0.15s;
  }
  #admin-save { background: #d4a857; color: #0a1520; }
  #admin-save:hover { background: #e8c06a; }
  #admin-discard { background: #162235; color: #7a9ab8; border: 1px solid #2a4060; }
  #admin-discard:hover { background: #1e3048; }
  #admin-saved-msg { text-align: center; color: #5cb85c; font-size: 0.87em; min-height: 1.4em; margin-top: 10px; }

  /* ── City info sidebar ────────────────────────────────── */
  .city-info-icon {
    text-align: center; font-size: 2.2em; margin-bottom: 8px;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.6));
  }

  /* ── Admin tabs ───────────────────────────────────────── */
  .admin-tabs { display: flex; gap: 6px; margin-bottom: 20px; }
  .atab {
    flex: 1; padding: 9px 0;
    background: #162235; border: 1px solid #2a4060;
    border-radius: 5px; color: #7a9ab8;
    font-family: 'Georgia', serif; font-size: 0.88em;
    letter-spacing: 1px; cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .atab:hover { background: #1e3048; color: #c0d4e8; }
  .atab.active { background: #1e3a5a; border-color: #d4a857; color: #d4a857; box-shadow: 0 0 0 1px rgba(212,168,67,0.25), 0 2px 8px rgba(0,0,0,0.3); }

  /* ── Admin polish ─────────────────────────────────────── */
  #admin-panel { backdrop-filter: blur(3px); background: rgba(4,8,14,0.62); }
  #admin-inner {
    background: linear-gradient(180deg, #0d1b2a 0%, #0a1622 100%);
    box-shadow: 0 18px 60px rgba(0,0,0,0.85), inset 0 0 0 1px rgba(212,168,67,0.10);
  }
  #admin-inner > h2 { background: linear-gradient(90deg, transparent, rgba(212,168,67,0.10), transparent); border-radius: 5px; }
  .admin-tabs { flex-wrap: wrap; }
  .atab { min-width: 78px; padding: 8px 4px; }

  /* Shared admin buttons */
  .abtn-primary, .abtn-ghost {
    flex: 1; padding: 11px; border-radius: 6px; cursor: pointer;
    font-family: 'Georgia', serif; font-size: 0.95em; font-weight: bold; transition: filter 0.15s, background 0.15s;
  }
  .abtn-primary { background: #d4a857; color: #0a1520; border: none; }
  .abtn-primary:hover { background: #e8c06a; }
  .abtn-ghost { background: #162235; color: #9ab4cc; border: 1px solid #2a4060; }
  .abtn-ghost:hover { background: #1e3048; color: #c8dcef; }

  /* ── Footer / tools ───────────────────────────────────── */
  #admin-footer {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    margin-top: 24px; padding-top: 16px; border-top: 1px solid #1e3a55;
  }
  .af-foot-label { color: #8aabca; font-size: 0.72em; letter-spacing: 1.5px; text-transform: uppercase; }
  .abtn-tool {
    background: #162235; border: 1px solid #2a4060; color: #9ab4cc;
    padding: 8px 14px; border-radius: 6px; cursor: pointer;
    font-family: 'Georgia', serif; font-size: 0.88em; transition: border-color 0.15s, color 0.15s, background 0.15s;
  }
  .abtn-tool:hover { border-color: #d4a857; color: #d4a857; background: #1c2c40; }

  /* ── Biomes tab ───────────────────────────────────────── */
  .bm-note { color: #9fb4c6; font-size: 0.86em; line-height: 1.5; margin-bottom: 16px;
    background: rgba(40,30,12,0.3); border: 1px solid #3a4a2a; border-radius: 6px; padding: 10px 12px; }
  .bm-note b { color: #e8c87a; }
  .bm-label { display: block; color: #8aabca; font-size: 0.75em; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px; }
  #bm-palette { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; }
  .bm-opt {
    display: flex; align-items: center; gap: 7px; padding: 8px 10px;
    background: #0e1a28; border: 1px solid #243a52; border-radius: 6px;
    color: #d0dce8; font-family: 'Georgia', serif; font-size: 0.86em; cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .bm-opt:hover { border-color: #5a7a9a; background: #142436; }
  .bm-opt.sel { border-color: #d4a857; background: #1c2e44; color: #f0d79a; box-shadow: 0 0 0 1px rgba(212,168,67,0.3); }
  .bm-sw { width: 16px; height: 16px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.3); flex-shrink: 0; }
  .bm-sw-erase { display: flex; align-items: center; justify-content: center; background: #1a2535; color: #8aa; font-size: 0.9em; }
  .bm-msg { text-align: center; color: #5cb85c; font-size: 0.87em; min-height: 1.3em; margin-top: 10px; }

  /* ── City tab ─────────────────────────────────────────── */
  .city-tab-top { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; }
  .city-tab-top select { flex: 1; }
  #city-new-btn {
    padding: 9px 14px; background: #1e3a5a; border: 1px solid #d4a857;
    border-radius: 5px; color: #d4a857; font-family: 'Georgia', serif;
    font-size: 0.88em; cursor: pointer; white-space: nowrap;
    transition: background 0.15s;
  }
  #city-new-btn:hover { background: #2a4e72; }
  .coord-row { display: flex; gap: 8px; align-items: center; }
  .coord-row input { width: 90px; flex-shrink: 0; }
  #cf-pick {
    padding: 8px 12px; background: #162235; border: 1px solid #2a4060;
    border-radius: 5px; color: #8aabca; font-family: 'Georgia', serif;
    font-size: 0.85em; cursor: pointer; white-space: nowrap;
    transition: border-color 0.15s, color 0.15s;
  }
  #cf-pick:hover, #cf-pick.picking { border-color: #d4a857; color: #d4a857; }
  #cf-pick.picking { background: #1e3a5a; animation: pulse-border 1s infinite; }
  @keyframes pulse-border { 0%,100%{border-color:#d4a857} 50%{border-color:#7a6030} }
  #cf-delete { background: #5a1515 !important; color: #e8c8c8 !important;
    border: 1px solid #8a2020 !important; }
  #cf-delete:hover { background: #7a1e1e !important; }
  #city-saved-msg { text-align: center; color: #5cb85c; font-size: 0.87em;
    min-height: 1.4em; margin-top: 10px; }

  /* ── Pick-mode overlay ────────────────────────────────── */
  #pick-hint {
    display: none; position: fixed;
    bottom: 24px; left: 50%; transform: translateX(-50%);
    z-index: 500;
    background: rgba(10,20,35,0.92); border: 1px solid #d4a857;
    border-radius: 8px; padding: 10px 22px;
    color: #d4a857; font-family: 'Georgia', serif; font-size: 0.92em;
    pointer-events: none; white-space: nowrap;
  }
  #pick-hint.visible { display: block; }
  body.pick-mode #map-wrap { cursor: crosshair !important; }
  body.pick-mode #admin-panel { display: none; }
  body.tile-draw-mode #map-wrap { cursor: crosshair !important; }
  body.tile-draw-mode #admin-panel { display: none; }
  body.road-draw-mode #map-wrap { cursor: crosshair !important; }
  body.road-draw-mode #admin-panel { display: none; }

  /* ── Tile info ─────────────────────────────────────────── */
  .tile-info-swatch {
    display: inline-block; width: 22px; height: 22px;
    border-radius: 4px; border: 2px solid rgba(255,255,255,0.25);
    vertical-align: middle; margin-right: 8px; flex-shrink: 0;
  }
  /* ── Tile admin tab ────────────────────────────────────── */
  #tile-color-row { display:flex; gap:6px; flex-wrap:wrap; margin-top:6px; }
  .tile-swatch-btn {
    width: 26px; height: 26px; border-radius: 4px; border: 2px solid transparent;
    cursor: pointer; flex-shrink: 0; transition: border-color 0.15s, transform 0.1s;
  }
  .tile-swatch-btn:hover { transform: scale(1.15); }
  .tile-swatch-btn.sel { border-color: #d4a857; }
  #tf-color-custom { width:36px; height:26px; border:none; padding:0; cursor:pointer;
    border-radius:4px; background:none; }
  /* Draw mode hint bar */
  .draw-tool-btn {
    flex: 1; font-size: 0.78em; padding: 5px 2px;
    background: rgba(10,20,35,0.6); border: 1px solid #2a4060;
    border-radius: 4px; color: #8aadca; cursor: pointer; transition: border-color 0.15s, color 0.15s;
  }
  .draw-tool-btn:hover { border-color: #5a8aaa; color: #aacada; }
  .draw-tool-btn.active { border-color: #d4a857; color: #d4a857; background: rgba(40,25,5,0.7); }

  #tile-draw-hint, #road-draw-hint {
    display: none; position: fixed;
    bottom: 24px; left: 50%; transform: translateX(-50%);
    z-index: 500;
    background: rgba(10,20,35,0.92); border: 1px solid #4a9a4a;
    border-radius: 8px; padding: 10px 22px;
    color: #7aca7a; font-family: 'Georgia', serif; font-size: 0.88em;
    pointer-events: none; white-space: nowrap;
  }
  #tile-draw-hint.visible, #road-draw-hint.visible { display: block; }

  /* ── Drag Mode button (перенесён в админ-панель) ─────────── */
  #drag-mode-btn {
    display: none !important;   /* плавающая кнопка скрыта; управление — в админ-панели */
    position: fixed;
    bottom: 62px; right: 16px;
    z-index: 200;
    width: 38px; height: 38px;
    background: rgba(10,20,35,0.88);
    border: 1px solid #2a4060;
    border-radius: 50%;
    color: #3a5a7a;
    font-size: 1.25em;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.18s, color 0.18s, background 0.18s;
    padding: 0;
  }
  #drag-mode-btn:hover { border-color: #d4a857; color: #d4a857; background: rgba(20,35,55,0.97); }
  #drag-mode-btn.active {
    background: rgba(80,48,8,0.95);
    border-color: #d4a857;
    color: #d4a857;
    box-shadow: 0 0 8px 2px rgba(212,168,67,0.35);
  }
  body.drag-mode #map-wrap { cursor: default !important; }

  /* ── Measure Mode button & panel ──────────────────────── */
  #measure-btn {
    position: fixed;
    bottom: 106px; right: 16px;
    z-index: 200;
    width: 38px; height: 38px;
    background: rgba(10,20,35,0.88);
    border: 1px solid #2a4060;
    border-radius: 50%;
    color: #3a5a7a;
    font-size: 1.15em;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.18s, color 0.18s, background 0.18s;
    padding: 0;
  }
  #measure-btn:hover { border-color: #d4a857; color: #d4a857; background: rgba(20,35,55,0.97); }

  /* ── War Mode ────────────────────────────────────────────── */
  #war-btn {
    position: fixed; bottom: 150px; right: 16px;
    z-index: 200; width: 38px; height: 38px;
    background: rgba(10,20,35,0.88); border: 1px solid #2a4060;
    border-radius: 50%; color: #3a5a7a; font-size: 1.15em; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.18s, color 0.18s, background 0.18s; padding: 0;
  }
  #war-btn:hover { border-color: #cc3333; color: #cc6666; background: rgba(30,8,8,0.97); }
  #war-btn.active { background: rgba(70,8,8,0.95); border-color: #cc3333; color: #ff7777; box-shadow: 0 0 8px 2px rgba(200,40,40,0.4); }

  /* Auth modal */
  #war-auth-modal {
    position: fixed; inset: 0; background: rgba(0,0,0,0.65);
    z-index: 1000; display: none; align-items: center; justify-content: center;
  }
  #war-auth-box {
    background: #060e18; border: 1px solid #aa2222; border-radius: 8px;
    padding: 28px 32px; min-width: 290px; text-align: center; font-family: Georgia, serif;
  }
  #war-auth-title { color: #ff6666; font-size: 1.35em; margin-bottom: 5px; }
  #war-auth-sub { color: #7a8898; font-size: 0.87em; margin-bottom: 16px; }
  #war-auth-input {
    width: 100%; box-sizing: border-box; background: #0a1420;
    border: 1px solid #aa2222; color: #f0e0c0; padding: 8px 12px;
    border-radius: 4px; font-size: 1em; margin-bottom: 8px; outline: none;
  }
  #war-auth-error { color: #ff5555; font-size: 0.85em; min-height: 1.2em; margin-bottom: 8px; }
  #war-auth-btns { display: flex; gap: 8px; justify-content: center; }
  #war-auth-ok  { background: #5a0808; border: 1px solid #cc3333; color: #ffaaaa; padding: 6px 20px; border-radius: 4px; cursor: pointer; }
  #war-auth-cancel { background: #121e2e; border: 1px solid #2a4060; color: #8a98a8; padding: 6px 20px; border-radius: 4px; cursor: pointer; }
  #war-auth-ok:hover { background: #8a1010; } #war-auth-cancel:hover { color: #c0d0e0; }

  /* War HUD (статус-бар лорда) */
  #war-status-bar {
    position: fixed; bottom: 18px; left: 18px; z-index: 200;
    background: linear-gradient(180deg, rgba(18,12,10,0.97), rgba(10,7,7,0.97));
    border: 1px solid #7a2222; border-radius: 9px;
    padding: 8px 12px;
    font-family: Georgia, serif; font-size: 0.9em;
    color: #f0e0c0; display: none; align-items: center; gap: 12px;
    white-space: nowrap;
    box-shadow: 0 6px 22px rgba(0,0,0,0.55), inset 0 0 0 1px rgba(255,255,255,0.04);
    transition: border-color 0.4s, box-shadow 0.4s;
  }
  #war-status-bar.starving { border-color: #ff5533; box-shadow: 0 0 18px 2px rgba(220,60,30,0.45); animation: hud-pulse 1.6s infinite; }
  @keyframes hud-pulse { 0%,100%{box-shadow:0 0 14px 1px rgba(220,60,30,0.35);} 50%{box-shadow:0 0 22px 4px rgba(220,60,30,0.6);} }
  #war-sigil {
    width: 18px; height: 18px; border-radius: 50%; flex-shrink: 0;
    background: #d4a857; border: 2px solid rgba(255,255,255,0.6);
    box-shadow: 0 0 6px rgba(0,0,0,0.6);
  }
  #war-status-name { color: #ffd0c0; font-weight: bold; }
  #war-treasury { display: inline-flex; align-items: center; gap: 7px; }
  .war-chip {
    display: inline-flex; align-items: center; gap: 4px;
    background: rgba(0,0,0,0.35); border: 1px solid #3a2a1a;
    border-radius: 20px; padding: 2px 10px; font-size: 0.92em; color: #e8d9b8;
  }
  .war-chip b { color: #ffe9b0; }
  .war-warn-chip { border-color: #aa3322; color: #ff8866; background: rgba(80,16,8,0.6); }
  #war-place-btn {
    background: #2a0808; border: 1px solid #882222; color: #ffb0b0;
    padding: 4px 11px; border-radius: 6px; cursor: pointer; font-size: 0.9em;
    transition: background 0.18s, border-color 0.18s;
  }
  #war-place-btn:hover { border-color: #cc3333; background: #3a0c0c; }
  #war-place-btn.active { background: rgba(140,20,20,0.9); border-color: #ff4444; box-shadow: 0 0 8px rgba(220,40,40,0.5); }
  #war-logout-btn {
    background: none; border: none; color: #7a6060; cursor: pointer; font-size: 1.05em; padding: 0 2px;
  }
  #war-logout-btn:hover { color: #cc6666; }
  body.war-place-mode #map-wrap { cursor: crosshair !important; }

  /* Кнопки войны (в панели информации) */
  .war-btn-gold, .war-btn-go, .war-btn-danger, .war-btn-muted {
    border-radius: 6px; cursor: pointer; font-family: Georgia, serif;
    font-size: 0.9em; padding: 6px 14px; transition: filter 0.15s, background 0.15s;
  }
  .war-btn-gold { background: linear-gradient(180deg,#2a3f5c,#1a2c44); border: 1px solid #d4a857; color: #f0d79a; }
  .war-btn-gold:hover { filter: brightness(1.18); }
  .war-btn-go { background: linear-gradient(180deg,#2f6a35,#1d4a23); border: 1px solid #6ad06a; color: #d8ffd0; font-weight: bold; }
  .war-btn-go:hover { filter: brightness(1.15); }
  .war-btn-go:disabled { opacity: 0.45; cursor: not-allowed; filter: grayscale(0.6); }
  .war-btn-danger { background: #2a1010; border: 1px solid #882020; color: #e07070; }
  .war-btn-danger:hover { filter: brightness(1.2); }
  .war-btn-muted { background: #121e2e; border: 1px solid #2a4060; color: #9ab0c4; }
  .war-btn-muted:hover { color: #c8d8e8; }

  /* Блок планируемого/текущего марша */
  .troop-march-box {
    margin-top: 10px; background: rgba(40,30,12,0.5);
    border: 1px solid #6a5520; border-radius: 7px; padding: 9px 11px; font-size: 0.9em;
  }
  .march-row { display: flex; justify-content: space-between; gap: 10px; padding: 2px 0; color: #cfc4ac; }
  .march-row b { color: #f0e6cc; }
  .march-warn { margin-top: 7px; color: #ff8866; font-size: 0.88em; border-top: 1px solid #5a3020; padding-top: 6px; }
  .troop-battle-box {
    margin-top: 10px; background: rgba(60,16,16,0.5);
    border: 1px solid #8a2a2a; border-radius: 7px; padding: 9px 11px; font-size: 0.9em;
  }
  .troop-battle-far {
    margin-top: 10px; font-size: 0.82em; color: #b08a82;
    border: 1px dashed #5a3030; border-radius: 7px; padding: 8px 10px;
  }

  /* Анимация марша (бегущий пунктир) */
  .troop-march { animation: march-dash 1.1s linear infinite; }
  .troop-preview { animation: march-dash 0.8s linear infinite; }
  @keyframes march-dash { to { stroke-dashoffset: -48; } }

  /* Экономика в админ-панели */
  .war-econ-box { background: rgba(40,30,12,0.32); border: 1px solid #4a3a1a; border-radius: 7px; padding: 11px 12px; }
  .war-econ-row { display: flex; align-items: center; gap: 6px; margin-bottom: 7px; }
  .war-econ-label { width: 96px; color: #d0c4a8; font-size: 0.9em; flex-shrink: 0; }
  .war-econ-input {
    flex: 1; min-width: 0; background: #0a1420; border: 1px solid #2a4060;
    color: #f0e0c0; padding: 5px 9px; border-radius: 4px; font-size: 0.9em;
  }
  .war-econ-set, .war-econ-add {
    background: #1a3050; border: 1px solid #3a5a80; color: #cfe0f0;
    width: 30px; border-radius: 4px; cursor: pointer; font-size: 1em; padding: 5px 0;
  }
  .war-econ-set:hover, .war-econ-add:hover { border-color: #d4a857; color: #f0d79a; }
  .war-rates-box .war-rate-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin: 7px 0; }
  .war-rates-box .war-rate-row span { color: #9ab0c4; font-size: 0.84em; }
  .war-rates-box .war-rate-row input { width: 78px; flex: none; }

  /* Login notification */
  #war-toast {
    position: fixed; top: 22px; left: 50%; transform: translateX(-50%);
    background: rgba(8,14,24,0.97); border: 1px solid #cc3333;
    color: #ffaaaa; padding: 11px 24px; border-radius: 6px;
    font-family: Georgia, serif; font-size: 0.92em; z-index: 2000;
    transition: opacity 0.6s; pointer-events: none;
  }

  /* Troop soldiers list */
  .troop-soldier { display: flex; align-items: center; gap: 5px; padding: 3px 0; border-bottom: 1px solid #1a2535; }
  .troop-soldier-name { flex:1; color: #c8bca8; font-size:0.9em; }
  .troop-sol-edit { background:none; border:none; color:#5a8aaa; cursor:pointer; font-size:0.85em; padding:1px 3px; }
  .troop-sol-del  { background:none; border:none; color:#aa4444; cursor:pointer; font-size:0.85em; padding:1px 3px; }

  /* Admin war passwords tab */
  .war-pw-row { display:flex; align-items:center; gap:8px; margin-bottom:7px; }
  .war-pw-row label { width:140px; color:#b8c8d8; font-size:0.88em; flex-shrink:0; }
  .war-pw-row input { flex:1; background:#0a1420; border:1px solid #2a4060; color:#f0e0c0; padding:4px 8px; border-radius:4px; font-size:0.88em; }
  #measure-btn.active {
    background: rgba(80,48,8,0.95);
    border-color: #d4a857;
    color: #d4a857;
    box-shadow: 0 0 8px 2px rgba(212,168,67,0.35);
  }
  body.measure-mode #map-wrap { cursor: crosshair !important; }
  #measure-info {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%);
    z-index: 200;
    background: rgba(10,18,30,0.94);
    color: #f0e0c0;
    border: 1px solid #d4a857;
    border-radius: 6px;
    padding: 8px 18px;
    font-family: Georgia, "Times New Roman", serif;
    font-size: 0.92em;
    white-space: nowrap;
    box-shadow: 0 4px 14px rgba(0,0,0,0.5);
    pointer-events: none;
    display: flex;
    align-items: center;
    gap: 20px;
  }
  #measure-info b { color: #d4a857; }
  #measure-info .mi-row { display: flex; justify-content: space-between; gap: 12px; margin-top: 4px; }
  #measure-info .mi-hint { color: #8a98a8; font-size: 0.82em; margin-top: 8px; font-style: italic; }

  /* ── Coordinate readout ───────────────────────────────── */
  #coord-display {
    position: fixed;
    bottom: 10px; left: 10px;
    z-index: 200;
    background: rgba(10,20,35,0.78);
    border: 1px solid #2a4060;
    border-radius: 5px;
    padding: 3px 10px;
    color: #7a9ab8;
    font-family: monospace; font-size: 0.80em;
    pointer-events: none;
    user-select: none;
  }

</style>

    activeNamed = el;
    showInfo(id);

// ── Pan & Zoom via viewBox (no CSS transform → no blur) ─────
const SVG_W = 3080, SVG_H = 4740;
const mapWrap  = document.getElementById('map-wrap');
const svg      = document.querySelector('#svg-container > svg');

let vx = 0, vy = 0, vw = SVG_W, vh = SVG_H;

function clamp(val, lo, hi) { return Math.max(lo, Math.min(hi, val)); }

// Пиксельный масштаб для slice: max(container_w/vw, container_h/vh)
function getScale() {
  const r = mapWrap.getBoundingClientRect();
  return Math.max(r.width / vw, r.height / vh);
}

// Сколько SVG-единиц видно на экране при текущем масштабе
function visibleSVG() {
  const r = mapWrap.getBoundingClientRect();
  const s = getScale();
  return { w: r.width / s, h: r.height / s };
}

// Применить viewBox с правильными ограничениями для slice
function applyViewBox() {
  vw = clamp(vw, 200, SVG_W);
  vh = vw * (SVG_H / SVG_W);
  const vis = visibleSVG();
  vx = clamp(vx, 0, Math.max(0, SVG_W - vis.w));
  vy = clamp(vy, 0, Math.max(0, SVG_H - vis.h));
  svg.setAttribute('viewBox', `${vx} ${vy} ${vw} ${vh}`);
  updateLabels();
  updateCities();
  if (window.updateTilesVisibility) window.updateTilesVisibility();
  if (window.updateRoadsVisibility) window.updateRoadsVisibility();
}

// Wheel = zoom centred on cursor
mapWrap.addEventListener('wheel', e => {
  e.preventDefault();
  const r      = mapWrap.getBoundingClientRect();
  const s      = getScale();
  // SVG-точка под курсором
  const svgX   = vx + (e.clientX - r.left) / s;
  const svgY   = vy + (e.clientY - r.top)  / s;

  const factor = e.deltaY < 0 ? 1 / 1.12 : 1.12;
  vw = clamp(vw * factor, 200, SVG_W);
  vh = vw * (SVG_H / SVG_W);

  const newS   = getScale();                    // пересчитываем после смены vw/vh
  const vis    = visibleSVG();
  vx = clamp(svgX - (e.clientX - r.left) / newS, 0, Math.max(0, SVG_W - vis.w));
  vy = clamp(svgY - (e.clientY - r.top)  / newS, 0, Math.max(0, SVG_H - vis.h));

  svg.setAttribute('viewBox', `${vx} ${vy} ${vw} ${vh}`);
  updateLabels();
  updateCities();
  if (window.updateTilesVisibility) window.updateTilesVisibility();
  if (window.updateRoadsVisibility) window.updateRoadsVisibility();
}, { passive: false });

// Drag = pan
let dragging = false, dsx, dsy, dvx, dvy;

mapWrap.addEventListener('mousedown', e => {
  const editing = window._tileDrawMode || window._roadDrawMode ||
                  document.body.classList.contains('pick-mode') ||
                  window._roadEditMode || window._measureMode || window._warPlaceMode ||
                  window._warMoveMode || window._terrainPaintMode;
  if (editing) {
    if (e.button !== 1 && e.button !== 2) return;
  } else {
    if (e.button !== 0) return;
  }
  dragging = true;
  dsx = e.clientX; dsy = e.clientY;
  dvx = vx;        dvy = vy;
  mapWrap.classList.add('grabbing');
});

mapWrap.addEventListener('contextmenu', e => {
  const editing = window._tileDrawMode || window._roadDrawMode ||
                  document.body.classList.contains('pick-mode') ||
                  window._roadEditMode || window._measureMode || window._warPlaceMode ||
                  window._warMoveMode || window._terrainPaintMode;
  if (editing) e.preventDefault();
});

window.addEventListener('mousemove', e => {
  if (!dragging) return;
  const s   = getScale();
  const vis = visibleSVG();
  vx = clamp(dvx - (e.clientX - dsx) / s, 0, Math.max(0, SVG_W - vis.w));
  vy = clamp(dvy - (e.clientY - dsy) / s, 0, Math.max(0, SVG_H - vis.h));
  svg.setAttribute('viewBox', `${vx} ${vy} ${vw} ${vh}`);
  if (window.updateTilesVisibility) window.updateTilesVisibility();
  if (window.updateRoadsVisibility) window.updateRoadsVisibility();
});

window.addEventListener('mouseup', () => {
  if (!dragging) return;
  dragging = false;
  mapWrap.classList.remove('grabbing');
});

// Double-click = reset
mapWrap.addEventListener('dblclick', () => {
  vx = 0; vy = 0; vw = SVG_W; vh = SVG_H;
  applyViewBox();
});

// ── Region labels (visible only at max zoom-out) ──────────
(function() {
  const labelText = {
    'beyond-the-wall': ['Земли', 'за Стеной'],
    'north':           ['Север'],
    'iron-islands':    ['Железные', 'острова'],
    'westerlands':     ['Западные', 'земли'],
    'riverlands':      ['Речные', 'земли'],
    'vale':            ['Долина', 'Аррен'],
    'crownlands':      ['Королевские', 'земли'],
    'stormlands':      ['Штормовые', 'земли'],
    'reach':           ['Простор'],
    'dorne':           ['Дорн'],
    'braavos':         ['Браавос']
  };

  // Manual position overrides — loaded from localStorage, fallback to defaults
  window.labelOffsets = { 'dorne': { dx: -320, dy: -480 }, 'riverlands': { dx: -160, dy: 130 } };
  try { var _lo = localStorage.getItem('wm_label_offsets'); if (_lo) window.labelOffsets = JSON.parse(_lo); } catch(e) {}
  const labelOffsets = window.labelOffsets;

  const NS = 'http://www.w3.org/2000/svg';
  const labelsG = document.createElementNS(NS, 'g');
  labelsG.setAttribute('id', 'region-labels');
  labelsG.setAttribute('pointer-events', 'none');
  svg.appendChild(labelsG);

  // Build a <defs> filter for crisp text shadow
  const defs = document.createElementNS(NS, 'defs');
  defs.innerHTML = `
    <filter id="lbl-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="5" result="thick"/>
      <feFlood flood-color="#000" flood-opacity="0.85" result="color"/>
      <feComposite in="color" in2="thick" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>`;
  svg.insertBefore(defs, svg.firstChild);

  namedRegions.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    let bb;
    try { bb = el.getBBox(); } catch(e) { return; }

    const lines  = labelText[id] || [id];
    const FS     = 68;          // font-size in SVG units
    const LH     = FS * 1.18;  // line-height
    const off    = labelOffsets[id] || { dx: 0, dy: 0 };
    const cx     = bb.x + bb.width  / 2;
    const cy     = bb.y + bb.height / 2 - (lines.length - 1) * LH / 2;

    const lg = document.createElementNS(NS, 'g');
    lg.setAttribute('data-label-id', id);
    lg.setAttribute('transform', `translate(${off.dx},${off.dy})`);
    lg.style.cursor = 'default';

    lines.forEach((line, i) => {
      const t = document.createElementNS(NS, 'text');
      t.setAttribute('x', cx);
      t.setAttribute('y', cy + i * LH);
      t.setAttribute('text-anchor', 'middle');
      t.setAttribute('dominant-baseline', 'middle');
      t.setAttribute('font-family', 'Georgia, "Times New Roman", serif');
      t.setAttribute('font-size', FS);
      t.setAttribute('font-weight', 'bold');
      t.setAttribute('fill', '#f5e9c8');
      t.setAttribute('filter', 'url(#lbl-shadow)');
      t.setAttribute('letter-spacing', '1');
      t.textContent = line;
      lg.appendChild(t);
    });
    labelsG.appendChild(lg);
  });

  window._labelsG = labelsG;
})();

function updateLabels() {
  const g = window._labelsG;
  if (!g) return;
  if (!g._fadeReady) { g.style.transition = 'opacity 0.35s'; g._fadeReady = true; }
  const show = vw >= SVG_W * 0.85;
  g.style.opacity = show ? '1' : '0';
  g.style.pointerEvents = show ? '' : 'none';
}
updateLabels();

(function () {
  const NS  = 'http://www.w3.org/2000/svg';
  const grp = document.createElementNS(NS, 'g');
  grp.setAttribute('id', 'city-markers');
  grp.setAttribute('pointer-events', 'none'); // group transparent; children override
  grp.style.opacity = '0';
  svg.appendChild(grp);
  window._citiesG    = grp;
  window._activeCityEl = null;

  window.renderCities = function () {
    while (grp.firstChild) grp.removeChild(grp.firstChild);
    window._activeCityEl = null;

    window.citiesData.forEach(([name, cx, cy, desc = ''], idx) => {
      const g = document.createElementNS(NS, 'g');
      g.setAttribute('data-city-idx', idx);
      g.style.cursor        = 'pointer';
      g.style.pointerEvents = 'all';

      // Invisible hit-area (easier to click)
      const hit = document.createElementNS(NS, 'circle');
      hit.setAttribute('cx', cx); hit.setAttribute('cy', cy);
      hit.setAttribute('r', '20');
      hit.setAttribute('fill', 'transparent');
      g.appendChild(hit);

      // Visible dot
      const dot = document.createElementNS(NS, 'circle');
      dot.setAttribute('cx', cx); dot.setAttribute('cy', cy);
      dot.setAttribute('r', '10');
      dot.setAttribute('fill', '#c8d4da');
      dot.setAttribute('stroke', '#5a7888');
      dot.setAttribute('stroke-width', '3');
      dot.classList.add('city-dot');
      g.appendChild(dot);

      // Label — stroke rendered behind fill via paint-order (no two-layer artifact)
      const t = document.createElementNS(NS, 'text');
      t.setAttribute('x', cx + 14); t.setAttribute('y', cy + 7);
      t.setAttribute('font-family', 'Georgia, "Times New Roman", serif');
      t.setAttribute('font-size', '22');
      t.setAttribute('font-weight', 'bold');
      t.setAttribute('fill', '#f0e0c0');
      t.setAttribute('stroke', '#2a0a0a');
      t.setAttribute('stroke-width', '5');
      t.setAttribute('stroke-linejoin', 'round');
      t.setAttribute('paint-order', 'stroke');
      t.textContent = name;
      g.appendChild(t);

      // Click — show city info
      g.addEventListener('click', e => {
        if (window._moved) return;
        e.stopPropagation();
        // Deselect active region
        if (activeNamed) { activeNamed.classList.remove('active'); activeNamed = null; }
        // Deselect previous city
        if (window._activeCityEl) {
          const prev = window._activeCityEl.querySelector('.city-dot');
          if (prev) { prev.setAttribute('fill', '#c8d4da'); prev.setAttribute('stroke', '#5a7888'); }
        }
        // Activate this city
        dot.setAttribute('fill', '#d4a857');
        dot.setAttribute('stroke', '#9a6a00');
        window._activeCityEl = g;
        window.showCityInfo(idx);
      });

      grp.appendChild(g);
    });
  };
  window.renderCities();
})();

window.showCityInfo = function(idx) {
  const entry = window.citiesData[idx];
  if (!entry) return;
  const [name, , , desc = '', image = ''] = entry;
  document.getElementById('info').innerHTML = `
    ${image ? `<img class="sigil-img" src="${image}" alt="${name}" onerror="this.style.display='none'">` : '<div class="city-info-icon">🏰</div>'}
    <h2>${name}</h2>
    ${desc
      ? `<p>${desc}</p>`
      : `<p class="placeholder" style="margin-top:12px;font-size:0.88em">Описание не добавлено</p>`
    }
  `;
};

(function () {
  'use strict';
  const NS = 'http://www.w3.org/2000/svg';
  const roadsG = document.getElementById('roads');

  window.roadsData = [
    {
      id: 'kings-road',
      name: 'Королевский тракт',
      points: [[1784,1745],[1760,1817],[1732,1907],[1696,2009],[1712,2087],[1744,2173],[1784,2273],[1796,2347],[1800,2445],[1800,2537],[1792,2625],[1808,2717],[1840,2817],[1868,2897],[1892,2987],[1916,3097],[1936,3237],[1960,3417]]
    }
  ];
  try { var _sr = localStorage.getItem('wm_roads'); if (_sr) window.roadsData = JSON.parse(_sr); } catch(e) {}

  window._roadEditMode = null;

  function pointsToD(pts) {
    if (!pts || pts.length < 2) return '';
    return 'M' + pts.map(([x, y]) => x + ',' + y).join(' L');
  }

  function distToSegment(p, a, b) {
    const dx = b[0]-a[0], dy = b[1]-a[1];
    if (dx===0 && dy===0) return Math.hypot(p[0]-a[0], p[1]-a[1]);
    const t = Math.max(0, Math.min(1, ((p[0]-a[0])*dx + (p[1]-a[1])*dy) / (dx*dx+dy*dy)));
    return Math.hypot(p[0]-(a[0]+t*dx), p[1]-(a[1]+t*dy));
  }

  window.renderRoads = function () {
    while (roadsG.firstChild) roadsG.removeChild(roadsG.firstChild);

    window.roadsData.forEach(function (road) {
      const d = pointsToD(road.points);
      if (!d) return;

      const outer = document.createElementNS(NS, 'path');
      outer.setAttribute('class', 'road-outer');
      outer.setAttribute('d', d);
      outer.style.pointerEvents = 'stroke';
      outer.style.cursor = 'crosshair';
      roadsG.appendChild(outer);

      const inner = document.createElementNS(NS, 'path');
      inner.setAttribute('class', 'road-inner');
      inner.setAttribute('d', d);
      inner.style.pointerEvents = 'none';
      roadsG.appendChild(inner);

      // Клик на дорогу — вставить точку
      outer.addEventListener('click', function (e) {
        if (window._roadEditMode !== road.id) return;
        e.stopPropagation();
        const r  = mapWrap.getBoundingClientRect();
        const sc = getScale();
        const svgX = Math.round(vx + (e.clientX - r.left) / sc);
        const svgY = Math.round(vy + (e.clientY - r.top)  / sc);
        let bestIdx = 0, bestDist = Infinity;
        for (let i = 0; i < road.points.length - 1; i++) {
          const dist = distToSegment([svgX, svgY], road.points[i], road.points[i+1]);
          if (dist < bestDist) { bestDist = dist; bestIdx = i; }
        }
        road.points.splice(bestIdx + 1, 0, [svgX, svgY]);
        window.renderRoads();
        if (window._persistMap) window._persistMap(); // <-- СИНХРОНИЗАЦИЯ С ФАЙРБЕЙС ДЛЯ ДОБАВЛЕНИЯ ТОЧКИ
        if (window._roadAdminRefresh) window._roadAdminRefresh();
      });

      // Перетаскивание точек дороги
      if (window._roadEditMode === road.id) {
        road.points.forEach(function (pt, idx) {
          const c = document.createElementNS(NS, 'circle');
          c.setAttribute('cx', pt[0]);
          c.setAttribute('cy', pt[1]);
          c.setAttribute('r', 18);
          c.setAttribute('fill', '#d4a043');
          c.setAttribute('fill-opacity', '0.85');
          c.setAttribute('stroke', '#5c3a10');
          c.setAttribute('stroke-width', '4');
          c.style.cursor = 'grab';
          c.style.pointerEvents = 'all';

          // Двойной клик — удалить точку
          c.addEventListener('dblclick', function (e) {
            e.stopPropagation();
            if (road.points.length <= 2) return;
            road.points.splice(idx, 1);
            window.renderRoads();
            if (window._persistMap) window._persistMap(); // <-- СИНХРОНИЗАЦИЯ С ФАЙРБЕЙС ДЛЯ УДАЛЕНИЯ ТОЧКИ
            if (window._roadAdminRefresh) window._roadAdminRefresh();
          });

          // Тянем точку мышкой
          c.addEventListener('mousedown', function (e) {
            if (e.button !== 0) return;
            e.stopPropagation();
            e.preventDefault();
            c.style.cursor = 'grabbing';
            function onMove(me) {
              const r  = mapWrap.getBoundingClientRect();
              const sc = getScale();
              road.points[idx][0] = Math.round(vx + (me.clientX - r.left) / sc);
              road.points[idx][1] = Math.round(vy + (me.clientY - r.top)  / sc);
              window.renderRoads();
            }
            function onUp() {
              document.removeEventListener('mousemove', onMove);
              document.removeEventListener('mouseup', onUp);
              if (window._persistMap) window._persistMap(); // <-- СИНХРОНИЗАЦИЯ ПОСЛЕ ДВИЖЕНИЯ МЫШКОЙ
            }
            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onUp);
          });

          roadsG.appendChild(c);
        });
      }
    });
  };

  window.setRoadEditMode = function (id) {
    window._roadEditMode = id;
    roadsG.style.pointerEvents = id ? 'all' : 'none';
    window.renderRoads();
  };

  // Zoom-based visibility (same threshold as tiles)
  var ROAD_ZOOM_THRESHOLD = SVG_W * 0.45;
  roadsG.style.transition = 'opacity 0.35s';
  roadsG.style.opacity = '0';

  window.updateRoadsVisibility = function () {
    var on = window._roadEditMode || window._roadDrawMode;
    var visible = on || vw <= ROAD_ZOOM_THRESHOLD;
    roadsG.style.opacity = visible ? '1' : '0';
  };

  window.renderRoads();
  window.updateRoadsVisibility();
})();

    return bestPt ? { pt: bestPt, snapped: true } : { pt: [x, y], snapped: false };
  }

  // ── Douglas-Peucker simplification ───────────────────────
  function perpDist(p, a, b) {
    var dx = b[0]-a[0], dy = b[1]-a[1];
    if (dx===0 && dy===0) return Math.hypot(p[0]-a[0], p[1]-a[1]);
    var t = Math.max(0, Math.min(1, ((p[0]-a[0])*dx + (p[1]-a[1])*dy) / (dx*dx+dy*dy)));
    return Math.hypot(p[0]-a[0]-t*dx, p[1]-a[1]-t*dy);
  }
  function simplify(pts, epsilon) {
    if (pts.length <= 2) return pts;
    var dmax = 0, idx = 0, last = pts.length - 1;
    for (var i = 1; i < last; i++) {
      var d = perpDist(pts[i], pts[0], pts[last]);
      if (d > dmax) { dmax = d; idx = i; }
    }
    if (dmax > epsilon) {
      var r1 = simplify(pts.slice(0, idx+1), epsilon);
      var r2 = simplify(pts.slice(idx), epsilon);
      return r1.slice(0, -1).concat(r2);
    }
    return [pts[0], pts[last]];
  }

  // ── Shared tile finish ────────────────────────────────────
  function finishTile(pts) {
    if (pts.length < 3) { exitDrawMode(); return; }
    exitDrawMode();
    var tile = { id:'tile-'+Date.now(), name:'', desc:'', color:window._pendingTileColor, points:pts };

    window.renderTiles();
    if (window._persistMap) window._persistMap();
    if (window._tileAdminOpen) window._tileAdminSelect(window.tilesData.length-1);
  }

  // ── Tool-specific previews ────────────────────────────────
  function updateRectPreview(x1, y1, x2, y2) {
    while (previewG.firstChild) previewG.removeChild(previewG.firstChild);
    var col = window._pendingTileColor;
    var rect = document.createElementNS(NS, 'polygon');
    rect.setAttribute('points', x1+','+y1+' '+x2+','+y1+' '+x2+','+y2+' '+x1+','+y2);
    rect.style.fill = col; rect.style.fillOpacity = '0.18';
    rect.style.stroke = col; rect.style.strokeWidth = '2.5'; rect.style.strokeDasharray = '7 3';
    previewG.appendChild(rect);
    [[x1,y1],[x2,y1],[x2,y2],[x1,y2]].forEach(function(p, i) {
      var c = document.createElementNS(NS, 'circle');
      c.setAttribute('cx', p[0]); c.setAttribute('cy', p[1]); c.setAttribute('r', i===0 ? 9 : 5);
      c.style.fill = i===0 ? col : '#fff'; c.style.stroke = '#000'; c.style.strokeWidth = '1.5';
      previewG.appendChild(c);
    });
  }

  function updateFreehandPreview() {
    while (previewG.firstChild) previewG.removeChild(previewG.firstChild);
    var pts = _freehandPoints;
    if (pts.length >= 2) {
      var pl = document.createElementNS(NS, 'polyline');
      pl.setAttribute('points', pts.map(function(p){return p[0]+','+p[1];}).join(' '));
      pl.style.fill = 'none'; pl.style.stroke = window._pendingTileColor;

    if (_cursorSnapped && _cursorSnapPt) {

  function finishPolygon() {
    var pts = window._drawPoints.slice();
    if (pts.length < 3) { cancelDraw(); return; }
    finishTile(pts);
  }

  function exitDrawMode() {
    window._tileDrawMode = false;
    window._drawPoints = [];
    _rectFirstPt = null;
    _freehandActive = false;

    window._drawPoints = [];

    _freehandPoints = [];
    document.body.classList.add('tile-draw-mode');
    var hints = {
      polygon:  '◆ Кликайте для добавления вершин · Двойной клик / Enter — завершить · Esc — отмена',
      rect:     '▬ Кликните первый угол, затем второй · Esc — отмена',
      freehand: '✏ Зажмите кнопку мыши и рисуйте · Отпустите — завершить · Esc — отмена'

    drawHint.classList.add('visible');

  // ── SVG event listeners for draw mode ─────────────────────
  svgEl.addEventListener('mousedown', function (e) {
    if (!window._tileDrawMode || e.button !== 0) return;

    var c = svgCoords(e);

      if (!_rectFirstPt) {

        updateRectPreview(c[0], c[1], c[0], c[1]);
      } else {
        finishTile([[_rectFirstPt[0],_rectFirstPt[1]],[c[0],_rectFirstPt[1]],[c[0],c[1]],[_rectFirstPt[0],c[1]]]);

    if (!window._tileDrawMode || (window._tileDrawTool||'polygon') !== 'polygon') return;

  });

  document.addEventListener('mouseup', function (e) {

  });

  document.addEventListener('keydown', function (e) {
    if (!window._tileDrawMode) return;
    if (e.key === 'Escape') cancelDraw();
    if (e.key === 'Enter' && (window._tileDrawTool||'polygon') === 'polygon') finishPolygon();

  document.addEventListener('keydown', function (e) {
    if (!e.ctrlKey || e.key !== 'z') return;
    if (window._tileDrawMode) return; // don't undo mid-draw

    e.preventDefault();
    window.tilesData.pop();

    if (window._persistMap) window._persistMap();
  });

  // ── Zoom-based visibility ─────────────────────────────────
  // Tiles appear as soon as region labels disappear (same threshold: 85% of full width)
  var TILE_ZOOM_THRESHOLD = SVG_W * 0.85; // ~2618 SVG units

  tilesG.style.transition = 'opacity 0.3s';
  tilesG.style.opacity = '0';

  window.updateTilesVisibility = function () {
    var visible = (vw <= TILE_ZOOM_THRESHOLD);
    tilesG.style.opacity = visible ? '1' : '0';
    tilesG.style.pointerEvents = visible ? 'all' : 'none';
  };

  window.renderTiles();
})();

// ── Persistence ──────────────────────────────────────────────
window._persistMap = function () {

  } catch(e) {}
};

    cityEditor.style.display = 'none';
    adminPanel.classList.add('open');

  function populateCitySelect() {
    const cur = citySel.value;
    citySel.innerHTML = '<option value="">— выберите город —</option>';
    window.citiesData.forEach(([name], i) => {
      const opt = document.createElement('option');
      opt.value = i; opt.textContent = name;
      citySel.appendChild(opt);
    });
    citySel.value = cur;
  }

  citySel.addEventListener('change', () => {
    const v = citySel.value;
    if (v === '') { cityEditor.style.display = 'none'; return; }
    editingCityIdx = parseInt(v);
    const [name, cx, cy, desc = '', image = ''] = window.citiesData[editingCityIdx];
    cfName.value = name; cfDesc.value = desc; cfX.value = cx; cfY.value = cy;
    cfImage.value = image;
    if (image) { cfImgPrev.src = image; cfImgPrev.style.display = 'block'; } else { cfImgPrev.style.display = 'none'; }

    } else {
      window.citiesData[editingCityIdx] = [name, cx, cy, desc, image];
    }

    updateCities();

  let _pickBtn = null, _pickBtnOrig = '';

  function enterPickMode(btn, origText) {
    pickMode = true;

    e.stopPropagation();
    const r  = mapWrap.getBoundingClientRect();
    const sc = getScale();
    const px = Math.round(vx + (e.clientX - r.left) / sc);

    if (pickTarget === 'road') {
      const road = window.roadsData.find(r => r.id === editingRoadId);

  // Rubber-band preview group
  const _rdSvg = document.querySelector('svg');
  const _rdNS  = 'http://www.w3.org/2000/svg';
  const _rdPreviewG = document.createElementNS(_rdNS, 'g');
  _rdSvg.appendChild(_rdPreviewG);

  function updateRoadRubberBand(cx, cy) {
    while (_rdPreviewG.firstChild) _rdPreviewG.removeChild(_rdPreviewG.firstChild);
    if (!window._roadDrawMode) return;
    const road = window.roadsData.find(r => r.id === editingRoadId);
    if (!road || !road.points.length) return;
    const last = road.points[road.points.length - 1];
    const ln = document.createElementNS(_rdNS, 'line');
    ln.setAttribute('x1', last[0]); ln.setAttribute('y1', last[1]);
    ln.setAttribute('x2', cx);      ln.setAttribute('y2', cy);
    ln.style.stroke = '#d4a857'; ln.style.strokeWidth = '3';
    ln.style.strokeDasharray = '10 5'; ln.style.opacity = '0.7';
    ln.style.pointerEvents = 'none';
    _rdPreviewG.appendChild(ln);
    const dot = document.createElementNS(_rdNS, 'circle');
    dot.setAttribute('cx', cx); dot.setAttribute('cy', cy); dot.setAttribute('r', 7);
    dot.style.fill = '#d4a857'; dot.style.opacity = '0.8'; dot.style.pointerEvents = 'none';
    _rdPreviewG.appendChild(dot);
  }

  function startRoadDraw() {
    if (!editingRoadId) return;

  function stopRoadDraw() {
    window._roadDrawMode = false;
    document.body.classList.remove('road-draw-mode');
    roadDrawHint.classList.remove('visible');
    while (_rdPreviewG.firstChild) _rdPreviewG.removeChild(_rdPreviewG.firstChild);
    const rfDrawBtn = document.getElementById('rf-draw-btn');
    if (rfDrawBtn) { rfDrawBtn.textContent = '✏ Рисовать'; rfDrawBtn.classList.remove('picking'); }
    window._persistMap();

  document.getElementById('rf-draw-btn').addEventListener('click', () => {

  // SVG capture handlers for road draw
  _rdSvg.addEventListener('mousedown', function (e) {
    if (!window._roadDrawMode || e.button !== 0) return;
    e.stopPropagation(); e.preventDefault();
    const r  = mapWrap.getBoundingClientRect();
    const sc = getScale();
    const px = Math.round(vx + (e.clientX - r.left) / sc);
    const py = Math.round(vy + (e.clientY - r.top)  / sc);
    const road = window.roadsData.find(r => r.id === editingRoadId);
    if (road) { road.points.push([px, py]); window.renderRoads(); }
  }, true);

  _rdSvg.addEventListener('dblclick', function (e) {
    if (!window._roadDrawMode) return;
    e.stopPropagation();
    // remove duplicate point added by the last single-click before dblclick
    const road = window.roadsData.find(r => r.id === editingRoadId);
    if (road && road.points.length > 1) road.points.pop();
    window.renderRoads();
    stopRoadDraw();
  }, true);

  document.addEventListener('mousemove', function (e) {
    if (!window._roadDrawMode) return;
    const r  = mapWrap.getBoundingClientRect();
    const sc = getScale();
    const cx = Math.round(vx + (e.clientX - r.left) / sc);
    const cy = Math.round(vy + (e.clientY - r.top)  / sc);
    updateRoadRubberBand(cx, cy);
  });

  function fmtTime(ts) {
    var d = new Date(ts), pad = function(n){ return n<10?'0'+n:n; };
    return pad(d.getDate())+'.'+pad(d.getMonth()+1)+' '+pad(d.getHours())+':'+pad(d.getMinutes());
  }

  function populateWarPasswords() {
    // Show list, hide detail
    document.getElementById('war-list-view').style.display = '';

    var pws = getWarPws();
    var list = document.getElementById('war-faction-list');

      var has = pws[f[0]] ? '●' : '○';
      var clr = pws[f[0]] ? '#7acc7a' : '#5a6a7a';
      return '<div class="war-fac-item" data-fid="'+f[0]+'" style="display:flex;justify-content:space-between;align-items:center;padding:9px 12px;background:#0a1420;border:1px solid #1a2535;border-radius:4px;margin-bottom:5px;cursor:pointer;transition:border-color 0.18s">'
        + '<span style="color:#d0c8b8">'+f[1]+'</span>'
        + '<span style="color:'+clr+';font-size:1.1em" title="'+(pws[f[0]]?'пароль задан':'пароль не задан')+'">'+has+'</span>'
        + '</div>';
    }).join('');
    list.querySelectorAll('.war-fac-item').forEach(function(el){

      'Войск: <b>'+up.size+'</b> бойцов &nbsp;·&nbsp; содержание ~<b>'+window.WarEcon.fmt(up.food)+'</b> 🌾 + <b>'+window.WarEcon.fmt(up.money)+'</b> 💰 за игр.день'

      var input = document.getElementById('war-econ-'+res);
      var val = parseFloat(input.value); if (isNaN(val)) return;
      var econ = window.WarEcon.get(fid);

      window.WarEcon.set(fid, econ);

// ── Drag Mode ────────────────────────────────────────────────
(function () {
  'use strict';
  const NS = 'http://www.w3.org/2000/svg';

  window._dragMode = false;

  // Button
  document.body.insertAdjacentHTML('beforeend',
    '<button id="drag-mode-btn" title="Режим перетаскивания">✥</button>'
  );
  const btn = document.getElementById('drag-mode-btn');

  // Separate group for road-endpoint handles (appended last → on top)
  const svgEl = document.querySelector('svg');
  const handlesG = document.createElementNS(NS, 'g');
  handlesG.setAttribute('id', 'drag-ep-handles');
  handlesG.style.display = 'none';
  svgEl.appendChild(handlesG);

  function renderEndpointHandles() {
    while (handlesG.firstChild) handlesG.removeChild(handlesG.firstChild);
    if (!window._dragMode) return;
    window.roadsData.forEach(function (road) {
      if (!road.points.length) return;
      const endIdxs = road.points.length === 1 ? [0] : [0, road.points.length - 1];
      endIdxs.forEach(function (ptIdx) {
        const pt = road.points[ptIdx];
        const c = document.createElementNS(NS, 'circle');
        c.setAttribute('cx', pt[0]);
        c.setAttribute('cy', pt[1]);
        c.setAttribute('r', 22);
        c.setAttribute('fill', '#d4a043');
        c.setAttribute('fill-opacity', '0.80');
        c.setAttribute('stroke', '#5c3a10');
        c.setAttribute('stroke-width', '5');
        c.setAttribute('data-drag-road', road.id);
        c.setAttribute('data-drag-ptidx', ptIdx);
        c.style.cursor = 'grab';
        c.style.pointerEvents = 'all';
        handlesG.appendChild(c);
      });
    });
  }

  function setDragMode(on) {
    window._dragMode = on;
    btn.classList.toggle('active', on);
    document.body.classList.toggle('drag-mode', on);
    handlesG.style.display = on ? '' : 'none';
    // Enable pointer-events on region labels so they can be dragged
    const lg = document.getElementById('region-labels');
    if (lg) lg.style.pointerEvents = on ? 'all' : 'none';
    renderEndpointHandles();
  }

  btn.addEventListener('click', function () { setDragMode(!window._dragMode); });

  // ── Drag state ──────────────────────────────────────────
  let _drag = null;      // active drag descriptor
  let _didMove = false;  // true once mouse moved during drag

  // Suppress click events that follow a drag
  document.addEventListener('click', function (e) {
    if (_didMove) { e.stopPropagation(); e.preventDefault(); _didMove = false; }
  }, true);

  // Find what was clicked — returns descriptor or null
  function findTarget(target) {
    // Road endpoint handle
    if (target.hasAttribute && target.hasAttribute('data-drag-road')) {
      return {
        type: 'road',
        roadId: target.getAttribute('data-drag-road'),
        ptIdx: parseInt(target.getAttribute('data-drag-ptidx')),
        el: target
      };
    }
    // Walk up DOM for city / terrain / label
    let el = target;
    while (el && el !== svgEl) {
      const ci = el.getAttribute && el.getAttribute('data-city-idx');
      if (ci !== null && ci !== '') return { type: 'city', idx: parseInt(ci), el };
      const ti = el.getAttribute && el.getAttribute('data-terrain-idx');
      if (ti !== null && ti !== '') return { type: 'terrain', idx: parseInt(ti), el };
      const li = el.getAttribute && el.getAttribute('data-label-id');
      if (li !== null && li !== '') return { type: 'label', labelId: li, el };
      el = el.parentElement;
    }
    return null;
  }

  // SVG mousedown — capture phase so we can eat the event before map-pan sees it
  svgEl.addEventListener('mousedown', function (e) {
    if (!window._dragMode || e.button !== 0) return;
    const t = findTarget(e.target);
    if (!t) return;
    e.stopPropagation();
    e.preventDefault();
    _drag = t;
    _didMove = false;
    if (t.el) t.el.style.cursor = 'grabbing';
  }, true);

  // Mousemove — update data + re-render live
  document.addEventListener('mousemove', function (e) {
    if (!_drag) return;
    _didMove = true;
    const r  = mapWrap.getBoundingClientRect();
    const sc = getScale();
    const sx = Math.round(vx + (e.clientX - r.left) / sc);
    const sy = Math.round(vy + (e.clientY - r.top)  / sc);

    if (_drag.type === 'city') {
      const c = window.citiesData[_drag.idx];
      if (c) { c[1] = sx; c[2] = sy; window.renderCities(); }

    } else if (_drag.type === 'terrain') {
      const t = window.terrainData[_drag.idx];
      if (t) { t[1] = sx; t[2] = sy; window.renderTerrain(); }

    } else if (_drag.type === 'label') {
      if (!_drag.startSvgX) { _drag.startSvgX = sx; _drag.startSvgY = sy; }
      const off = window.labelOffsets[_drag.labelId] || { dx: 0, dy: 0 };
      const ndx = (off.dx || 0) + (sx - _drag.startSvgX);
      const ndy = (off.dy || 0) + (sy - _drag.startSvgY);
      _drag.el.setAttribute('transform', `translate(${ndx},${ndy})`);
      _drag.pendingDx = ndx; _drag.pendingDy = ndy;

    } else if (_drag.type === 'road') {
      const road = window.roadsData.find(function (r) { return r.id === _drag.roadId; });
      if (road) {
        road.points[_drag.ptIdx][0] = sx;
        road.points[_drag.ptIdx][1] = sy;
        window.renderRoads();
        renderEndpointHandles();
      }
    }
  });

  // Mouseup — persist (Обновленная версия для синхронизации названий)
  document.addEventListener('mouseup', function () {
    if (!_drag) return;
    if (_drag.type === 'label' && _drag.pendingDx !== undefined) {
      window.labelOffsets[_drag.labelId] = { dx: _drag.pendingDx, dy: _drag.pendingDy };
    }
    var type = _drag.type;
    _drag = null;
    
    // Принудительно вызываем сохранение в базу данных Firebase
    if (window._persistMap) {
      window._persistMap(); 
    }
    
    if (type === 'road') {
      renderEndpointHandles();
    }
  });

  // Keep handles in sync when roads change externally
  window._renderEndpointHandles = renderEndpointHandles;
})();

// ── Measure Distance ─────────────────────────────────────────
(function () {
  'use strict';
  var NS = 'http://www.w3.org/2000/svg';
  var svgEl = document.querySelector('#svg-container svg');
  var mapWrapEl = document.getElementById('map-wrap');

  // Scale: Wall (~y:280) → south Dorne (~y:4100) ≈ 3000 миль ≈ 4828 км
  // → 1 SVG unit ≈ 1.26 км; 1 лига ≈ 4.83 км
  var KM_PER_UNIT = 1.26;
  // Скорости движения
  var KM_PER_DAY_INFANTRY = 20;   // пехота ~20 км/день
  var KM_PER_DAY_FLEET    = 120;  // флотилия ~120 км/день

  window._measureMode = false;
  var points = [];

  // Button
  document.body.insertAdjacentHTML('beforeend',
    '<button id="measure-btn" title="Измерить расстояние (ESC — выход)">📏</button>'
  );
  var btn = document.getElementById('measure-btn');

  // Info panel
  var info = document.createElement('div');
  info.id = 'measure-info';
  info.style.display = 'none';
  document.body.appendChild(info);

  // SVG layer (appended last → on top of everything)
  var layer = document.createElementNS(NS, 'g');
  layer.setAttribute('id', 'measure-layer');
  layer.setAttribute('pointer-events', 'none');
  svgEl.appendChild(layer);

  function svgPt(e) {
    var r = mapWrapEl.getBoundingClientRect();
    var sc = getScale();
    return [
      Math.round(vx + (e.clientX - r.left) / sc),
      Math.round(vy + (e.clientY - r.top)  / sc)
    ];
  }

  function segDist(a, b) {
    var dx = b[0] - a[0], dy = b[1] - a[1];
    return Math.sqrt(dx*dx + dy*dy);
  }

  function totalDist() {
    var t = 0;
    for (var i = 1; i < points.length; i++) t += segDist(points[i-1], points[i]);
    return t;
  }

  function fmt(n) {
    return n >= 100 ? Math.round(n).toString()
         : n >= 10  ? n.toFixed(1)
         :            n.toFixed(2);
  }

  function render() {
    while (layer.firstChild) layer.removeChild(layer.firstChild);
    if (points.length === 0) {
      info.style.display = 'none';
      return;
    }

    if (points.length >= 2) {
      var d = 'M ' + points.map(function(p){return p.join(',');}).join(' L ');
      var path = document.createElementNS(NS, 'path');
      path.setAttribute('d', d);
      path.setAttribute('stroke', '#ffcc33');
      path.setAttribute('stroke-width', '5');
      path.setAttribute('stroke-dasharray', '16,10');
      path.setAttribute('stroke-linecap', 'round');
      path.setAttribute('stroke-linejoin', 'round');
      path.setAttribute('fill', 'none');
      layer.appendChild(path);
    }

    points.forEach(function (p, i) {
      var c = document.createElementNS(NS, 'circle');
      c.setAttribute('cx', p[0]);
      c.setAttribute('cy', p[1]);
      c.setAttribute('r', 9);
      c.setAttribute('fill', i === 0 ? '#7fff7f' : (i === points.length-1 ? '#ff7f7f' : '#ffcc33'));
      c.setAttribute('stroke', '#1a0f00');
      c.setAttribute('stroke-width', '3');
      layer.appendChild(c);
    });

    var total = totalDist();
    var km = total * KM_PER_UNIT;
    var infDays  = km / KM_PER_DAY_INFANTRY;
    var fleetDays = km / KM_PER_DAY_FLEET;

    function fmtDays(d) {
      if (d < 1) return '< 1 дня';
      var days = Math.round(d);
      return days + ' дней';
    }

    var html =
      '<span><b>' + fmt(km) + ' км</b></span>' +
      '<span>🗡 Пехота: <b>' + fmtDays(infDays) + '</b></span>' +
      '<span>⚓ Флотилия: <b>' + fmtDays(fleetDays) + '</b></span>';
    if (points.length === 1) {
      html += '<div class="mi-hint">Кликни ещё точки</div>';
    } else {
      html += '<div class="mi-hint">ESC — очистить</div>';
    }
    info.innerHTML = html;
    info.style.display = 'block';
  }

  function enter() {
    window._measureMode = true;
    document.body.classList.add('measure-mode');
    btn.classList.add('active');
    points = [];
    render();
  }

  function exit() {
    window._measureMode = false;
    document.body.classList.remove('measure-mode');
    btn.classList.remove('active');
    points = [];
    render();
  }

  btn.addEventListener('click', function () {
    if (window._measureMode) exit(); else enter();
  });

  // Capture-phase so we eat the click before regions/cities/etc see it
  svgEl.addEventListener('click', function (e) {
    if (!window._measureMode) return;
    if (e.button !== 0) return;
    e.stopPropagation();
    e.preventDefault();
    points.push(svgPt(e));
    render();
  }, true);

  // Double-click in measure mode should NOT reset zoom
  svgEl.addEventListener('dblclick', function (e) {
    if (!window._measureMode) return;
    e.stopPropagation();
    e.preventDefault();
  }, true);

  document.addEventListener('keydown', function (e) {
    if (!window._measureMode) return;
    if (e.key === 'Escape') {
      if (points.length > 0) { points = []; render(); }
      else exit();
    }
  });
})();

  // ── Geometry helpers ──────────────────────────────────────
  function pointInPolygon(x, y, pts) {
    var inside = false;
    for (var i = 0, j = pts.length-1; i < pts.length; j = i++) {
      var xi = pts[i][0], yi = pts[i][1], xj = pts[j][0], yj = pts[j][1];
      if (((yi > y) !== (yj > y)) && (x < (xj-xi)*(y-yi)/(yj-yi)+xi)) inside = !inside;
    }
    return inside;
  }

  function tileBBox(tile) {
    var x1=Infinity,y1=Infinity,x2=-Infinity,y2=-Infinity;
    tile.points.forEach(function(p){
      if(p[0]<x1)x1=p[0]; if(p[1]<y1)y1=p[1];
      if(p[0]>x2)x2=p[0]; if(p[1]>y2)y2=p[1];
    });
    return {x:x1,y:y1,w:x2-x1,h:y2-y1};
  }

  function bboxNear(a, b, gap) {
    return a.x <= b.x+b.w+gap && b.x <= a.x+a.w+gap &&
           a.y <= b.y+b.h+gap && b.y <= a.y+a.h+gap;
  }

  function findTile(x, y) {
    var tiles = window.tilesData || [];
    for (var i = 0; i < tiles.length; i++) {
      if (pointInPolygon(x, y, tiles[i].points)) return tiles[i].id;
    }
    return null;

  // ── Movement ──────────────────────────────────────────────
  // 1 реальный день = 24 игровых дня перехода. Пехота ~20 км / игровой день.
  var KM_PER_UNIT            = 1.26;
  var KM_PER_GAME_DAY        = 20;   // армия
  var KM_PER_GAME_DAY_FLEET  = 120;  // флот
  var GAME_DAYS_PER_REAL_DAY = 24;
  var MS_PER_REAL_DAY        = 86400000;
  var SEA_TOLERANCE          = 0.10; // доля «неправильной» местности, прощаемая (броды/каботаж)

  function troopSize(troop) { return Math.max(1, (troop.soldiers||[]).length); }
  function isFleet(troop)   { return troop.type === 'fleet'; }

  // Просчёт маршрута по прямой с учётом местности (суша/море/дороги/тип тайла)
  // Один отрезок маршрута (произвольные начало/конец) с учётом местности
  function planSegment(fleet, x0, y0, tx, ty) {
    var dx = tx - x0, dy = ty - y0;
    var distUnits = Math.hypot(dx, dy);
    var n = Math.max(2, Math.ceil(distUnits / 22));
    var effUnits = 0, wrongUnits = 0, total = 0;
    var prev = { x:x0, y:y0 };
    for (var i=1; i<=n; i++) {
      var f = i/n;
      var cx = x0 + dx*f, cy = y0 + dy*f;
      var segLen = Math.hypot(cx-prev.x, cy-prev.y);
      var terr = terrainAt((cx+prev.x)/2, (cy+prev.y)/2);
      var mult;
      if (terr.block) {            // непроходимые горы — стена для всех (и армии, и флота)
        mult = 0.05; wrongUnits += segLen;
      } else if (fleet) {
        if (terr.sea) { mult = 1.0; } else { mult = 0.08; wrongUnits += segLen; }
      } else {
        if (terr.sea) { mult = 0.08; wrongUnits += segLen; } else { mult = terr.mult; }
      }
      effUnits += segLen / (mult || 0.08);
      total += segLen;
      prev = { x:cx, y:cy };
    }
    var baseKmPerDay = fleet ? KM_PER_GAME_DAY_FLEET : KM_PER_GAME_DAY;
    var effKm = effUnits * KM_PER_UNIT;
    var gameDays = effKm / baseKmPerDay;
    return {
      tx:tx, ty:ty, fleet:fleet,
      km: distUnits * KM_PER_UNIT,
      effKm: effKm, gameDays: gameDays,
      durMs: (gameDays / GAME_DAYS_PER_REAL_DAY) * MS_PER_REAL_DAY,
      wrongFrac: total>0 ? wrongUnits/total : 0
    };
  }
  function planRoute(troop, tx, ty) { return planSegment(isFleet(troop), troop.x, troop.y, tx, ty); }

  // Многоточечный маршрут A→B→C… : суммирует все отрезки и стоимость
  function buildPendingRoute(troop, pts) {
    var fleet = isFleet(troop);
    var legs = [], km=0, effKm=0, gameDays=0, durMs=0, worst=0;
    var px = troop.x, py = troop.y;
    pts.forEach(function(p){
      var leg = planSegment(fleet, px, py, p[0], p[1]);
      legs.push(leg);
      km += leg.km; effKm += leg.effKm; gameDays += leg.gameDays; durMs += leg.durMs;
      if (leg.wrongFrac > worst) worst = leg.wrongFrac;
      px = p[0]; py = p[1];
    });
    var rates = getRates(), size = troopSize(troop), per100 = effKm/100;
    return {
      troopId: troop.id, pts: pts.slice(), legs: legs, fleet: fleet,
      km: km, effKm: effKm, gameDays: gameDays, durMs: durMs, wrongFrac: worst,
      cost: { money: Math.ceil(size*per100*rates.moveMoneyPer100), food: Math.ceil(size*per100*rates.moveFoodPer100) }
    };
  }
  function wpLetter(i) { return String.fromCharCode(66 + (i % 25)); } // 0→B, 1→C, …

  // Стоимость марша (деньги + еда) от размера войска и эфф. расстояния
  function moveCost(troop, plan) {
    var rates = getRates();
    var size = troopSize(troop), per100 = plan.effKm/100;
    return {
      money: Math.ceil(size * per100 * rates.moveMoneyPer100),
      food:  Math.ceil(size * per100 * rates.moveFoodPer100)
    };
  }

  function battleCost() {
    var r = getRates();
    return { money: Math.max(0, Math.round(r.battleMoney)), food: Math.max(0, Math.round(r.battleFood)) };
  }
  // Ближайшее войско фракции fid к врагу (по времени марша в игр. днях)
  function nearestAttacker(enemyTroop, fid) {
    var ep = troopPos(enemyTroop), best = null;
    (window.troopsData||[]).forEach(function(t){
      if (t.faction !== fid || t.id === enemyTroop.id) return;
      var plan = planRoute(t, ep.x, ep.y);
      if (!best || plan.gameDays < best.gameDays) best = { troop:t, gameDays:plan.gameDays, plan:plan };
    });
    return best;
  }
  function existingBattle(defenderTroopId, attackerFaction) {

  // Объявить битву: списать ресурсы, создать запись, синхронизировать
  function declareBattle(enemyTroop) {
    var s = window._warSession;
    if (!s || s.isAdmin || s.faction === enemyTroop.faction) return;
    if (existingBattle(enemyTroop.id, s.faction)) { toast('Битва уже объявлена'); return; }
    var atk = nearestAttacker(enemyTroop, s.faction);
    if (!atk) { toast('Нет ваших войск поблизости'); return; }
    if (atk.gameDays > BATTLE_RANGE_DAYS) { toast('Враг слишком далеко (нужно ≤ '+BATTLE_RANGE_DAYS+' дней пути)'); return; }
    var cost = battleCost(), econ = getEcon(s.faction);
    if (econ.starving) { toast('Фракция голодает — битва невозможна'); return; }
    if (cost.money > econ.money || cost.food > econ.food) { toast('Недостаточно ресурсов в казне'); return; }
    if (!confirm('Объявить битву против «'+enemyTroop.name+'»?\nСтоимость: '+fmtRes(cost.money)+' 💰 + '+fmtRes(cost.food)+' 🌾')) return;
    econ.money -= cost.money; econ.food -= cost.food;

    window.battlesData.push({
