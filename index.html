  // Текущее положение войска с учётом перехода
  function troopPos(troop) {
    var m = troop.move;
    if (!m) return { x: troop.x, y: troop.y, moving: false };
    // многоточечный путь
    if (m.path && m.path.length >= 2) {
      var elapsed = Date.now() - m.start;
      if (elapsed >= m.durMs) { var L = m.path[m.path.length-1]; return { x:L[0], y:L[1], moving:false, arrived:true }; }
      var t = Math.max(0, elapsed), i = 0;
      while (i < m.legMs.length - 1 && t > m.legMs[i]) { t -= m.legMs[i]; i++; }
      var a = m.path[i], b = m.path[i+1];
      var lf = m.legMs[i] > 0 ? t / m.legMs[i] : 1; if (lf > 1) lf = 1;
      return { x: a[0]+(b[0]-a[0])*lf, y: a[1]+(b[1]-a[1])*lf, moving:true, frac: elapsed/m.durMs };
    }
    // одиночный отрезок (совместимость со старыми переходами)
    var dx = m.tx - m.fx, dy = m.ty - m.fy;
    var frac = m.durMs > 0 ? (Date.now() - m.start) / m.durMs : 1;
    if (frac >= 1) return { x: m.tx, y: m.ty, moving: false, arrived: true };
    return { x: m.fx + dx*frac, y: m.fy + dy*frac, moving: true, frac: frac };
  }

  function remainingGameDays(troop) {
    var m = troop.move; if (!m) return 0;
    var frac = m.durMs > 0 ? (Date.now() - m.start) / m.durMs : 1;
    frac = Math.max(0, Math.min(1, frac));
    return (m.gameDays||0) * (1 - frac);
  }

  function fmtGameDays(d) {
    if (d < 1) return '< 1 дня';
    return Math.round(d) + ' дней';
  }

  // Зафиксировать положение прибывших войск; вернуть true, если что-то изменилось
  function settleArrivals() {
    var changed = false;
    (window.troopsData||[]).forEach(function(troop){
      if (!troop.move) return;
      var pos = troopPos(troop);
      troop.x = Math.round(pos.x); troop.y = Math.round(pos.y);
      troop.tileId = findTile(troop.x, troop.y);
      if (pos.arrived) { delete troop.move; changed = true; }
    });
    if (changed) saveTroops();
    return changed;
  }

  // ── Содержание войск (списание ресурсов по игровым дням) ───
  // Возвращает true, если казна изменилась
  function settleUpkeep() {
    var s = window._warSession; if (!s) return false;
    if (!s.isAdmin) return false;            // содержание считает ТОЛЬКО админ-клиент (без гонок между лордами)
    var rates = getRates();
    // если оба тарифа содержания = 0 — содержание выключено, казну не трогаем вовсе
    if (!(rates.upkeepFoodPerDay > 0) && !(rates.upkeepMoneyPerDay > 0)) return false;
    var now = Date.now();
    // суммарный размер войск по фракциям
    var sizeByFaction = {};
    (window.troopsData||[]).forEach(function(t){
      if (t.faction === 'admin') return;
      sizeByFaction[t.faction] = (sizeByFaction[t.faction]||0) + troopSize(t);
    });
    var changed = false;
    Object.keys(sizeByFaction).forEach(function(fid){
      var size = sizeByFaction[fid] || 0;
      if (size === 0) return;
      var econ = getEcon(fid);
      if (!econ.lastUpkeep) { econ.lastUpkeep = now; setEcon(fid, econ); return; }
      var gameDaysElapsed = (now - econ.lastUpkeep) / MS_PER_REAL_DAY * GAME_DAYS_PER_REAL_DAY;
      if (gameDaysElapsed < 0.01) return;
      gameDaysElapsed = Math.min(gameDaysElapsed, 2);   // не списывать огромный «долг» за оффлайн одним махом
      var foodNeed  = size * rates.upkeepFoodPerDay  * gameDaysElapsed;
      var moneyNeed = size * rates.upkeepMoneyPerDay * gameDaysElapsed;
      if (foodNeed <= 0 && moneyNeed <= 0) { econ.lastUpkeep = now; setEcon(fid, econ); return; }
      econ.food  = Math.max(0, econ.food  - foodNeed);
      econ.money = Math.max(0, econ.money - moneyNeed);
      econ.starving = (econ.food <= 0 || econ.money <= 0);
      econ.lastUpkeep = now;
      setEcon(fid, econ);
      changed = true;
    });
    return changed;
  }

    var b = (window.battlesData||[]).find(function(x){return x.id===battleId;});
    if (!b) return;
    var s = window._warSession;
    var am = FACTION_META[b.attackerFaction]||{color:'#aaa',label:b.attackerFaction};
    var dm = FACTION_META[b.defenderFaction]||{color:'#aaa',label:b.defenderFaction};
    var canEnd = s && (s.isAdmin || s.faction === b.attackerFaction);
    var when = new Date(b.ts).toLocaleString('ru-RU');
    infoEl.innerHTML =
      '<h2 style="color:#ff6a50">⚔ Битва</h2>'
      + '<div class="field" style="margin-top:6px"><b style="color:'+am.color+'">'+am.label+'</b> <span style="color:#9ab">(«'+b.attackerTroopName+'»)</span></div>'
      + '<div style="text-align:center;color:#ff6a50;font-weight:bold;margin:4px 0">⚔ против ⚔</div>'
      + '<div class="field"><b style="color:'+dm.color+'">'+dm.label+'</b> <span style="color:#9ab">(«'+b.defenderTroopName+'»)</span></div>'
      + '<div class="field" style="margin-top:6px;font-size:0.84em;color:#8aa0b4">Объявлена: '+when+'</div>'
      + '<div class="field" style="font-size:0.84em;color:#8aa0b4">Место: x:'+b.x+', y:'+b.y+'</div>'
      + (canEnd ? '<button id="battle-end" class="war-btn-danger" style="margin-top:10px">✓ Завершить битву</button>' : '');
    var endBtn = document.getElementById('battle-end');
    if (endBtn) endBtn.onclick = function(){
      if (!confirm('Завершить и убрать битву с карты?')) return;
      var i = window.battlesData.indexOf(b);
      if (i>=0) window.battlesData.splice(i,1);
      saveBattles(); window.renderBattles(); infoEl.innerHTML='';
      if (!s.isAdmin) logAction('Завершил битву против «'+b.defenderTroopName+'»', b.x, b.y);
    };
  }
  window._showBattleInfo = showBattleInfo;

  window.renderTroops = function () {
    while (layer.firstChild) layer.removeChild(layer.firstChild);
    var pending = window._warPendingMove;

    (window.troopsData||[]).forEach(function(troop) {
      if (!isTroopVisible(troop)) return;
      var meta  = FACTION_META[troop.faction] || {color:'#aaa'};
      var pos   = troopPos(troop);
      var cx = pos.x, cy = pos.y;
      var fleet = isFleet(troop);

      // Предпросмотр планируемого марша (до подтверждения) — ломаная A→B→C…
      if (pending && pending.troopId === troop.id && pending.pts && pending.pts.length) {
        var pd = 'M'+cx+','+cy;
        pending.pts.forEach(function(p){ pd += ' L'+p[0]+','+p[1]; });
        var pl = mk('path', { d:pd, fill:'none', stroke:'#ffcc33', 'stroke-width':5,
          'stroke-dasharray':'4,12', 'stroke-linecap':'round', 'stroke-linejoin':'round',
          'stroke-opacity':0.95, 'pointer-events':'none' });
        pl.setAttribute('class','troop-march troop-preview');
        layer.appendChild(pl);
        pending.pts.forEach(function(p, wi){
          layer.appendChild(mk('circle', { cx:p[0], cy:p[1], r:14, fill:'rgba(20,15,5,0.6)',
            stroke:'#ffcc33', 'stroke-width':2.5, 'pointer-events':'none' }));
          var wt = mk('text', { x:p[0], y:p[1]+1, 'text-anchor':'middle', 'dominant-baseline':'middle',
            'font-size':13, 'font-weight':'bold', fill:'#ffe08a', 'pointer-events':'none' });
          wt.textContent = wpLetter(wi);
          layer.appendChild(wt);
        });
      }

      // Путь перехода в процессе (оставшаяся часть маршрута)
      if (pos.moving) {
        var mv = troop.move, dd;
        if (mv.path && mv.path.length >= 2) {
          dd = 'M'+cx+','+cy;
          var el2 = Date.now()-mv.start, tt = el2, ci = 0;
          while (ci < mv.legMs.length - 1 && tt > mv.legMs[ci]) { tt -= mv.legMs[ci]; ci++; }
          for (var pi = ci+1; pi < mv.path.length; pi++) dd += ' L'+mv.path[pi][0]+','+mv.path[pi][1];
        } else {
          dd = 'M'+cx+','+cy+' L'+mv.tx+','+mv.ty;
        }
        var line = mk('path', { d:dd, fill:'none', stroke:meta.color, 'stroke-width':4,
          'stroke-dasharray':'14,10', 'stroke-linecap':'round', 'stroke-linejoin':'round',
          'stroke-opacity':0.75, 'pointer-events':'none' });
        line.setAttribute('class','troop-march');
        layer.appendChild(line);
        var endp = (mv.path && mv.path.length) ? mv.path[mv.path.length-1] : [mv.tx, mv.ty];
        layer.appendChild(mk('circle', { cx:endp[0], cy:endp[1], r:15,
          fill:'none', stroke:meta.color, 'stroke-width':3, 'stroke-dasharray':'6,6',
          'stroke-opacity':0.85, 'pointer-events':'none' }));
      }

      var g = mk('g', { 'data-troop-id': troop.id });
      g.style.cursor = 'pointer';
      g.style.pointerEvents = 'all';

      // тень
      g.appendChild(mk('ellipse', { cx:cx, cy:cy+26, rx:18, ry:5, fill:'rgba(0,0,0,0.35)', 'pointer-events':'none' }));

      // основной знак — щит-кружок цвета фракции
      var bg = mk('circle', { cx:cx, cy:cy, r:24, fill:meta.color, 'fill-opacity':0.9,
        stroke:'#f4ecd8', 'stroke-width':3 });
      bg.style.filter = 'drop-shadow(0 0 5px rgba(0,0,0,0.5))';
      g.appendChild(bg);
      // внутреннее кольцо
      g.appendChild(mk('circle', { cx:cx, cy:cy, r:19, fill:'none',
        stroke:'rgba(255,255,255,0.35)', 'stroke-width':1, 'pointer-events':'none' }));

      var ico = mk('text', { x:cx, y:cy+1, 'text-anchor':'middle',
        'dominant-baseline':'middle', 'font-size':20, 'pointer-events':'none', fill:'#fff' });
      ico.textContent = pos.moving ? (fleet ? '⛵' : '⇒') : (fleet ? '⚓' : '⚔');
      g.appendChild(ico);

      // бейдж с числом солдат
      var cnt = troopSize(troop);
      g.appendChild(mk('circle', { cx:cx+19, cy:cy-19, r:11, fill:'#11171f',
        stroke:meta.color, 'stroke-width':2, 'pointer-events':'none' }));
      var badge = mk('text', { x:cx+19, y:cy-18, 'text-anchor':'middle',
        'dominant-baseline':'middle', 'font-size':12, 'font-weight':'bold',
        fill:'#f4ecd8', 'pointer-events':'none' });
      badge.textContent = cnt;
      g.appendChild(badge);

      var lbl = mk('text', { x:cx, y:cy+44, 'text-anchor':'middle', 'font-size':16,
        'font-family':'Georgia,serif', fill:'#f4ecd8', stroke:'#000', 'stroke-width':3,
        'paint-order':'stroke', 'pointer-events':'none' });
      lbl.textContent = troop.name;
      g.appendChild(lbl);

      g.addEventListener('click', function(e) {
        e.stopPropagation();
        showTroopInfo(troop.id);
      });
      g.addEventListener('mouseenter', function(){ bg.setAttribute('r', 27); });
      g.addEventListener('mouseleave', function(){ bg.setAttribute('r', 24); });
      layer.appendChild(g);
    });
    if (window.renderBattles) window.renderBattles();
  };

  // ── Тик движения: обновляем положения войск в пути ────────
  setInterval(function(){
    if (!window._warSession) return;
    var anyMoving = (window.troopsData||[]).some(function(t){return t.move;});
    if (!anyMoving) return;
    settleArrivals();
    window.renderTroops();
  }, 1000);

  // ── Тик содержания: списываем ресурсы и обновляем HUD ──────
  setInterval(function(){
    if (!window._warSession) return;
    if (settleUpkeep()) renderHUD();
  }, 15000);

  // ── Troop info panel ──────────────────────────────────────
  function showTroopInfo(troopId) {
    var troop = (window.troopsData||[]).find(function(t){return t.id===troopId;});
    if (!troop) return;
    var s      = window._warSession;
    var canEdit = s && (s.isAdmin || s.faction === troop.faction);
    var meta   = FACTION_META[troop.faction] || {color:'#aaa', label:troop.faction};

              ? '<button class="troop-sol-edit" data-i="'+i+'">✎</button>'
              + '<button class="troop-sol-del"  data-i="'+i+'">✕</button>'

        }).join('')
      : '<i style="color:#6a7a8a;font-size:0.88em">Нет солдат</i>';

    var typeLabel = isFleet(troop) ? '⚓ Флот' : '⚔ Армия';

    var moveBlock;

    if (troop.move) {

        + '<div style="color:#ffcc66"><b>⇒ В пути</b> → x:'+troop.move.tx+', y:'+troop.move.ty+'</div>'
        + '<div style="margin-top:3px">Осталось <b>'+fmtGameDays(remDays)+'</b> игровых'
        + ' <span style="color:#9ab">(~'+ (remReal<1?'<1':Math.round(remReal)) +' реальн. дн.)</span></div>'
        + '</div>'
        + (canEdit
          ? '<button id="troop-stop-move" class="war-btn-danger" style="margin-top:6px">Отменить движение</button>'
          : '');
    } else if (pending && pending.troopId === troop.id) {
      var c = pending.cost, econ = getEcon(troop.faction);
      var free = s && s.isAdmin;
      var blocked = pending.wrongFrac > SEA_TOLERANCE;
      var poor = !free && ((c.money > econ.money) || (c.food > econ.food));
      var route = 'A→' + pending.pts.map(function(_,i){ return wpLetter(i); }).join('→');
      var costRows = free
        ? '<div class="march-row"><span>Стоимость</span><b style="color:#9ad99a">бесплатно (админ)</b></div>'
        : '<div class="march-row"><span>💰 Деньги</span><b style="color:'+(c.money>econ.money?'#ff7777':'#e8d9b8')+'">'+fmtRes(c.money)+'</b></div>'
        + '<div class="march-row"><span>🌾 Еда</span><b style="color:'+(c.food>econ.food?'#ff7777':'#e8d9b8')+'">'+fmtRes(c.food)+'</b></div>';
      var rows =
          '<div class="march-row"><span>Точек</span><b>'+pending.pts.length+'</b></div>'
        + '<div class="march-row"><span>Расстояние</span><b>'+fmtRes(pending.km)+' км</b></div>'
        + '<div class="march-row"><span>С учётом местности</span><b>'+fmtRes(pending.effKm)+' км</b></div>'
        + '<div class="march-row"><span>Время в пути</span><b>'+fmtGameDays(pending.gameDays)+'</b> <span style="color:#9ab">(~'+(pending.gameDays/GAME_DAYS_PER_REAL_DAY<1?'<1':Math.round(pending.gameDays/GAME_DAYS_PER_REAL_DAY))+' р.дн.)</span></div>'
        + costRows;
      var starveBlock = !free && econ.starving;
      var warn = '';
      if (blocked) warn = '<div class="march-warn">'+(pending.fleet?'Флот не пройдёт по суше / непроходимым горам':'Армия не пройдёт через море / непроходимые горы')+' — измените маршрут</div>';
      else if (poor) warn = '<div class="march-warn">Недостаточно ресурсов в казне</div>';
      else if (starveBlock) warn = '<div class="march-warn">Фракция голодает — пополните запасы</div>';
      moveBlock = '<div class="troop-march-box">'
        + '<div style="color:#ffcc66;margin-bottom:6px"><b>Планируемый марш</b> <span style="color:#9ab;font-weight:normal">('+route+')</span></div>'
        + rows + warn
        + '<div style="display:flex;gap:6px;margin-top:8px">'
        + '<button id="troop-go" class="war-btn-go"'+((blocked||poor||starveBlock)?' disabled':'')+'>Выступить</button>'
        + '<button id="troop-add-point" class="war-btn-gold">➕ Точка</button>'
        + '</div>'
        + '<div style="display:flex;gap:6px;margin-top:6px">'
        + '<button id="troop-undo-point" class="war-btn-muted">↶ Убрать точку</button>'
        + '<button id="troop-cancel-move" class="war-btn-muted">Отмена</button>'
        + '</div></div>';
    } else {
      moveBlock = canEdit
        ? '<button id="troop-move" class="war-btn-gold" style="margin-top:8px">⇒ Переместить</button>'
        : '';
    }

    // Блок объявления битвы (для лорда, смотрящего на чужое войско)
    var battleBlock = '';
    if (s && !s.isAdmin && s.faction !== troop.faction) {
      var existing = existingBattle(troop.id, s.faction);
      if (existing) {
        battleBlock = '<div class="troop-battle-box"><div style="color:#ff9a6a"><b>⚔ Битва объявлена</b></div>'
          + '<div style="font-size:0.85em;color:#c8b0a0;margin-top:3px">Ваше войско «'+existing.attackerTroopName+'» вступает в бой.</div></div>';
      } else {
        var atk = nearestAttacker(troop, s.faction);
        if (atk && atk.gameDays <= BATTLE_RANGE_DAYS) {
          var bc = battleCost(), be = getEcon(s.faction);
          var bpoor = (bc.money > be.money) || (bc.food > be.food) || be.starving;
          battleBlock = '<div class="troop-battle-box">'
            + '<div style="font-size:0.85em;color:#c8b0a0">Ближайшее войско «'+atk.troop.name+'» — <b>'+fmtGameDays(atk.gameDays)+'</b> пути.</div>'
            + '<div class="march-row" style="margin-top:4px"><span>Стоимость битвы</span><b style="color:'+(bpoor?'#ff7777':'#e8d9b8')+'">'+fmtRes(bc.money)+' 💰 + '+fmtRes(bc.food)+' 🌾</b></div>'
            + (bpoor ? '<div class="march-warn">'+(be.starving?'Фракция голодает':'Недостаточно ресурсов в казне')+'</div>' : '')
            + '<button id="troop-battle" class="war-btn-danger" style="margin-top:6px"'+(bpoor?' disabled':'')+'>⚔ Объявить битву</button></div>';
        } else if (atk) {
          battleBlock = '<div class="troop-battle-far">⚔ Ваши войска далеко (<b>'+fmtGameDays(atk.gameDays)+'</b>). Битву можно объявить в пределах '+BATTLE_RANGE_DAYS+' дней пути.</div>';
        } else {
          battleBlock = '<div class="troop-battle-far">⚔ Поблизости нет ваших войск для битвы.</div>';
        }
      }
    }

    infoEl.innerHTML =
      '<h2 style="color:'+meta.color+'">'+troop.name+'</h2>'
      + '<div class="field"><b>Фракция:</b> '+meta.label+' &nbsp;·&nbsp; '+typeLabel+'</div>'
      + '<div class="field" style="margin-top:4px"><b>Позиция:</b> x:'+troop.x+', y:'+troop.y+'</div>'
      + moveBlock
      + battleBlock
      + '<div class="field" style="margin-top:8px"><b>Состав ('+soldiers.length+'):</b></div>'
      + '<div id="troop-sol-list" style="margin:6px 0 10px">'+solHtml+'</div>'
      + (canEdit
        ? '<div style="display:flex;gap:6px;margin-bottom:8px">'
          + '<input id="troop-new-name" type="text" placeholder="Имя бойца"'
          + ' style="flex:1;background:#0a1420;border:1px solid #2a4060;color:#f0e0c0;padding:4px 8px;border-radius:4px">'
          + '<button id="troop-add-sol" style="background:#1a3050;border:1px solid #d4a857;color:#d4a857;padding:4px 10px;border-radius:4px;cursor:pointer">+</button>'
          + '</div>'
          + '<div style="display:flex;gap:6px">'
          + '<button id="troop-ren" style="background:#1a2535;border:1px solid #3a5060;color:#a0b8c8;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:0.85em">Переименовать</button>'
          + '<button id="troop-del" style="background:#2a1010;border:1px solid #882020;color:#e07070;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:0.85em">Удалить войско</button>'
          + '</div>'
        : '');

    if (canEdit) {
      document.getElementById('troop-add-sol').onclick = function() {
        var n = document.getElementById('troop-new-name').value.trim();
        if (!n) return;
        var dup = soldierTaken(n);
        if (dup) { toast('«'+n+'» уже состоит в войске «'+dup.name+'»'); return; }
        troop.soldiers = troop.soldiers||[];
        troop.soldiers.push(n);
        saveTroops(); window.renderTroops(); showTroopInfo(troopId);
        logAction('Добавил бойца «'+n+'» в войско «'+troop.name+'»');
      };
      document.querySelectorAll('.troop-sol-edit').forEach(function(btn){
        btn.onclick = function(){
          var i = +btn.dataset.i;
          var old = troop.soldiers[i];
          var v = prompt('Новое имя:', old);
          if (v !== null && v.trim()) {
            var dup = soldierTaken(v.trim(), troop, i);
            if (dup) { toast('«'+v.trim()+'» уже состоит в войске «'+dup.name+'»'); return; }
            troop.soldiers[i]=v.trim(); saveTroops(); window.renderTroops(); showTroopInfo(troopId);
            logAction('Переименовал бойца «'+old+'» → «'+v.trim()+'» в войске «'+troop.name+'»');
          }
        };
      });
      document.querySelectorAll('.troop-sol-del').forEach(function(btn){
        btn.onclick = function(){
          var i = +btn.dataset.i; var removed = troop.soldiers[i];
          troop.soldiers.splice(i,1);
          saveTroops(); window.renderTroops(); showTroopInfo(troopId);
          logAction('Удалил бойца «'+removed+'» из войска «'+troop.name+'»');
        };
      });
      document.getElementById('troop-ren').onclick = function(){
        var old = troop.name;
        var v = prompt('Название войска:', troop.name);
        if (v !== null && v.trim()) {
          troop.name=v.trim(); saveTroops(); window.renderTroops(); showTroopInfo(troopId);
          logAction('Переименовал войско «'+old+'» → «'+v.trim()+'»');
        }
      };
      document.getElementById('troop-del').onclick = function(){
        if (!confirm('Удалить «'+troop.name+'»?')) return;
        var removed = troop.name;
        window.troopsData.splice(window.troopsData.indexOf(troop),1);
        saveTroops(); window.renderTroops(); infoEl.innerHTML='';
        logAction('Удалил войско «'+removed+'»');
      };
      var moveBtn = document.getElementById('troop-move');
      if (moveBtn) moveBtn.onclick = function(){ startMoveMode(troopId); };
      var stopBtn = document.getElementById('troop-stop-move');
      if (stopBtn) stopBtn.onclick = function(){
        // фиксируем текущее положение и отменяем переход
        var pos = troopPos(troop);
        troop.x = Math.round(pos.x); troop.y = Math.round(pos.y);
        troop.tileId = findTile(troop.x, troop.y);
        delete troop.move;
        saveTroops(); window.renderTroops(); showTroopInfo(troopId);
        logAction('Остановил войско «'+troop.name+'»', troop.x, troop.y);
      };
      var goBtn = document.getElementById('troop-go');
      if (goBtn) goBtn.onclick = function(){ confirmMove(troopId); };
      var addPtBtn = document.getElementById('troop-add-point');
      if (addPtBtn) addPtBtn.onclick = function(){ startMoveMode(troopId, true); };
      var undoPtBtn = document.getElementById('troop-undo-point');
      if (undoPtBtn) undoPtBtn.onclick = function(){
        var pend = window._warPendingMove;
        if (!pend || pend.troopId !== troopId || !pend.pts) return;
        pend.pts.pop();
        if (pend.pts.length === 0) window._warPendingMove = null;
        else window._warPendingMove = buildPendingRoute(troop, pend.pts);
        window.renderTroops(); showTroopInfo(troopId);
      };
      var cancelMoveBtn = document.getElementById('troop-cancel-move');
      if (cancelMoveBtn) cancelMoveBtn.onclick = function(){
        cancelPendingMove(); showTroopInfo(troopId);
      };
    }
    var battleBtn = document.getElementById('troop-battle');
    if (battleBtn) battleBtn.onclick = function(){ declareBattle(troop); };
  }

  // Подтвердить марш: списать ресурсы, запустить переход
  function confirmMove(troopId) {
    var pending = window._warPendingMove;
    if (!pending || pending.troopId !== troopId) return;
    var troop = (window.troopsData||[]).find(function(t){return t.id===troopId;});
    if (!troop) { cancelPendingMove(); return; }
    var c = pending.cost;
    var s = window._warSession, free = s && s.isAdmin;
    var econ = getEcon(troop.faction);
    if (pending.wrongFrac > SEA_TOLERANCE) { toast(pending.fleet?'Флот не пройдёт по суше / горам':'Армия не пройдёт через море / непроходимые горы'); return; }
    if (!free) {
      if (econ.starving) { toast('Фракция голодает — марш невозможен'); return; }
      if (c.money > econ.money || c.food > econ.food) { toast('Недостаточно ресурсов в казне'); return; }
      // списываем
      econ.money -= c.money; econ.food -= c.food;
      setEcon(troop.faction, econ);
    }
    // запускаем многоточечный переход
    var pos = troopPos(troop);
    troop.x = Math.round(pos.x); troop.y = Math.round(pos.y);
    var path = [[troop.x, troop.y]].concat(pending.pts.map(function(p){ return [p[0], p[1]]; }));
    var legMs = pending.legs.map(function(l){ return l.durMs; });
    var last = path[path.length-1];
    troop.move = {
      path: path, legMs: legMs,
      start: Date.now(), durMs: pending.durMs, gameDays: pending.gameDays,
      tx: last[0], ty: last[1]
    };
    window._warPendingMove = null;
    saveTroops(); window.renderTroops(); renderHUD(); showTroopInfo(troopId);
    logAction('Двинул '+(pending.fleet?'флот':'войско')+' «'+troop.name+'» по маршруту из '+pending.pts.length+' точ. → (x:'+last[0]+', y:'+last[1]+'); '
      + '💰'+fmtRes(c.money)+' 🌾'+fmtRes(c.food), last[0], last[1]);
  }

  // ── Toast notification ────────────────────────────────────
  function toast(msg) {
    var el = document.getElementById('war-toast') || document.createElement('div');
    el.id = 'war-toast'; el.textContent = msg; el.style.opacity = '1';
    document.body.appendChild(el);
    clearTimeout(el._t);
    el._t = setTimeout(function(){
      el.style.opacity='0';
      setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); },650);
    },3200);
  }
  window._warToast = toast;

  // ── Auth ──────────────────────────────────────────────────
  function tryLogin(pw) {
    if (pw === ADMIN_PASS) {
      window._warSession = {faction:'admin', isAdmin:true, name:'Администратор', factionLabel:'Администратор'};
      sessionStorage.setItem('wm_war_session', JSON.stringify(window._warSession));
      return true;
    }
    var pws = getWarPws();
    for (var fid in pws) {
      if (pws[fid] === pw) {
        var rd  = typeof regionData !== 'undefined' ? regionData[fid] : null;
        var lbl = (FACTION_META[fid]||{}).label || fid;
        window._warSession = {faction:fid, isAdmin:false, name: rd ? rd.leader : lbl, factionLabel:lbl};
        sessionStorage.setItem('wm_war_session', JSON.stringify(window._warSession));
        return true;
      }
    }
    return false;
  }

  // ── UI: buttons ───────────────────────────────────────────
  document.body.insertAdjacentHTML('beforeend',
    '<button id="war-btn" title="Режим войны (⚔)">⚔</button>'
    + '<div id="war-auth-modal">'
    +   '<div id="war-auth-box">'
    +     '<div id="war-auth-title">⚔ Режим войны</div>'
    +     '<div id="war-auth-sub">Введите пароль фракции</div>'
    +     '<input type="password" id="war-auth-input" placeholder="Пароль" autocomplete="off">'
    +     '<div id="war-auth-error"></div>'
    +     '<div id="war-auth-btns">'
    +       '<button id="war-auth-ok">Войти</button>'
    +       '<button id="war-auth-cancel">Отмена</button>'
    +     '</div>'
    +   '</div>'
    + '</div>'
    + '<div id="war-status-bar">'
    +   '<span id="war-sigil"></span>'
    +   '<span id="war-status-name"></span>'
    +   '<span id="war-treasury">'
    +     '<span class="war-chip" id="war-money" title="Казна — деньги">💰 <b>0</b></span>'
    +     '<span class="war-chip" id="war-food"  title="Запасы — еда">🌾 <b>0</b></span>'
    +     '<span class="war-chip war-warn-chip" id="war-starve" style="display:none">⚠ голод</span>'
    +   '</span>'
    +   '<button id="war-place-btn">+ Войска</button>'
    +   '<button id="war-logout-btn" title="Выйти">✕</button>'
    + '</div>'
  );

  var warBtn    = document.getElementById('war-btn');
  var authModal = document.getElementById('war-auth-modal');
  var authInput = document.getElementById('war-auth-input');
  var authErr   = document.getElementById('war-auth-error');
  var statusBar = document.getElementById('war-status-bar');
  var statusName= document.getElementById('war-status-name');
  var placeBtn  = document.getElementById('war-place-btn');
  var logoutBtn = document.getElementById('war-logout-btn');

  function renderHUD() {
    var s = window._warSession; if (!s) return;
    var sigil = document.getElementById('war-sigil');
    var meta = FACTION_META[s.faction] || { color:'#d4a857' };
    sigil.style.background = meta.color;
    statusName.textContent = s.isAdmin ? 'Администратор' : s.factionLabel + ' · ' + s.name;
    var treasury = document.getElementById('war-treasury');
    if (s.isAdmin) { treasury.style.display = 'none'; return; }
    treasury.style.display = 'inline-flex';
    var econ = getEcon(s.faction);
    document.querySelector('#war-money b').textContent = fmtRes(econ.money);
    document.querySelector('#war-food b').textContent  = fmtRes(econ.food);
    document.getElementById('war-starve').style.display = econ.starving ? 'inline-flex' : 'none';
    statusBar.classList.toggle('starving', !!econ.starving);
  }
  window.renderHUD = renderHUD;

  function updateUI() {
    var s = window._warSession;
    warBtn.classList.toggle('active', !!s);
    settleArrivals();
    settleUpkeep();
    if (!s) { statusBar.style.display='none'; window.renderTroops && window.renderTroops(); return; }
    statusBar.style.display = 'flex';
    renderHUD();
    window.renderTroops && window.renderTroops();
  }

  // War btn: open auth if not logged in, toggle status otherwise
  warBtn.addEventListener('click', function(){
    if (window._warSession) {
      // just flash status bar
      statusBar.style.outline = '1px solid #ff6666';
      setTimeout(function(){ statusBar.style.outline=''; },600);
    } else {
      authModal.style.display = 'flex';
      authInput.value = ''; authErr.textContent = '';
      setTimeout(function(){ authInput.focus(); },40);
    }
  });

  document.getElementById('war-auth-ok').addEventListener('click', function(){
    if (tryLogin(authInput.value)) {
      authModal.style.display = 'none';
      var s = window._warSession;
      var msg = s.isAdmin
        ? 'Вы авторизовались как Администратор'
        : 'Вы авторизовались как ' + s.name + ' · ' + s.factionLabel;
      toast(msg); updateUI();
      if (!s.isAdmin) {
        fetchIP(function(ip){ logLogin(s.faction, ip); });
      }
    } else {
      authErr.textContent = 'Неверный пароль';
    }
  });

  authInput.addEventListener('keydown', function(e){ if(e.key==='Enter') document.getElementById('war-auth-ok').click(); });
  document.getElementById('war-auth-cancel').addEventListener('click', function(){ authModal.style.display='none'; });
  authModal.addEventListener('click', function(e){ if(e.target===authModal) authModal.style.display='none'; });

  logoutBtn.addEventListener('click', function(){
    window._warSession = null; window._warPlaceMode = false;
    sessionStorage.removeItem('wm_war_session');
    placeBtn.classList.remove('active');
    document.body.classList.remove('war-place-mode');
    updateUI();
  });

  placeBtn.addEventListener('click', function(){
    if (!window._warSession) return;
    if (window._warMoveMode) stopMoveMode();
    window._warPlaceMode = !window._warPlaceMode;
    placeBtn.classList.toggle('active', window._warPlaceMode);
    document.body.classList.toggle('war-place-mode', window._warPlaceMode);
  });

  // ── Map click: pick destination → построить предпросмотр марша ─
  svgEl.addEventListener('click', function(e){
    if (!window._warMoveMode || !window._warSession) return;
    e.stopPropagation(); e.preventDefault();
    var troop = (window.troopsData||[]).find(function(t){return t.id===window._warMoveTroopId;});
    if (!troop) { stopMoveMode(); return; }
    var r  = mapWrapEl.getBoundingClientRect(), sc = getScale();
    var tx = Math.round(vx + (e.clientX-r.left)/sc);
    var ty = Math.round(vy + (e.clientY-r.top)/sc);
    var pend = window._warPendingMove;
    var pts;
    if (pend && pend.troopId === troop.id && pend.pts) {
      pts = pend.pts.concat([[tx, ty]]);            // добавляем ещё точку (B→C→…)
    } else {
      // новый маршрут — стартуем из текущего (возможно промежуточного) положения
      var pos = troopPos(troop);
      troop.x = Math.round(pos.x); troop.y = Math.round(pos.y);
      pts = [[tx, ty]];
    }
    window._warPendingMove = buildPendingRoute(troop, pts);
    stopMoveMode();
    window.renderTroops();
    showTroopInfo(troop.id);
  }, true);

  // ── Map click: place troop ────────────────────────────────
  svgEl.addEventListener('click', function(e){
    if (!window._warPlaceMode || !window._warSession) return;
    e.stopPropagation(); e.preventDefault();
    var r  = mapWrapEl.getBoundingClientRect(), sc = getScale();
    var x  = Math.round(vx + (e.clientX-r.left)/sc);
    var y  = Math.round(vy + (e.clientY-r.top)/sc);
    // Лорд может ставить войска только на своей территории (регион + переданные тайлы)
    if (!window._warSession.isAdmin && !canPlace(window._warSession.faction, x, y)) {
      toast('Войска можно ставить только на своей территории');
      return;
    }
    var name = prompt('Название войска:', 'Отряд ' + ((window.troopsData||[]).length+1));
    if (name === null) return;
    var onSea = terrainAt(x, y).sea;
    var type = confirm('Тип войска?\n\nОК — '+(onSea?'⚓ Флот (по морю)':'⚔ Армия (по суше)')
      + '\nОтмена — '+(onSea?'⚔ Армия (по суше)':'⚓ Флот (по морю)'))
      ? (onSea?'fleet':'army') : (onSea?'army':'fleet');
    var faction = window._warSession.isAdmin ? 'admin' : window._warSession.faction;
    var troopName = name.trim()||'Отряд';
    window.troopsData.push({
      id: 'troop-'+Date.now(), name: troopName,
      faction: faction, type: type, x: x, y: y,
      tileId: findTile(x, y), soldiers: []
    });
    saveTroops(); window.renderTroops();
    logAction('Разместил '+(type==='fleet'?'флот':'войско')+' «'+troopName+'»', x, y);
    window._warPlaceMode = false;
    placeBtn.classList.remove('active');
    document.body.classList.remove('war-place-mode');
  }, true);

  // ESC отменяет режим выбора точки назначения
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && window._warMoveMode) stopMoveMode();
  });

  // ── Init ──────────────────────────────────────────────────
  updateUI();
})();
</script>

<!-- ══════════════════════════════════════════════════════════
     ГЕНЕРАТОР ЛАНДШАФТА (лорные биомы Вестероса/Эссоса)
     Гибрид: каноничные зоны (по ПЛиО) + шум + домен-варп.
     Привязка к Королевской Гавани (1964, 3417).
═══════════════════════════════════════════════════════════ -->
<script>
(function () {
  'use strict';
  var NS  = 'http://www.w3.org/2000/svg';
  var svg = document.querySelector('#svg-container svg');
  if (!svg) return;

  var KLX = 1964, KLY = 3417;            // Королевская Гавань — точка отсчёта
  var FAR_NORTH_Y = 820;                 // севернее — Земли Вечной Зимы (снег)
  var DEEP_SOUTH_Y = 4180;               // южнее — пески Дорна
  var WARP = 230;                        // амплитуда искажения границ
  var VERSION = 6;

  // ── Биомы → цвет/множитель (совпадает с палитрой тайлов) ──
  var BIOME = {
    forest:    { name:'Лес',     mult:0.70, sea:false, color:'#4a8a5a' },
    mountains: { name:'Горы',    mult:0.45, sea:false, color:'#8a8a6a' },
    plains:    { name:'Равнины', mult:1.00, sea:false, color:'#c4a840' },
    desert:    { name:'Пустыня', mult:0.60, sea:false, color:'#7a3a2a' },
    swamp:     { name:'Болото',  mult:0.50, sea:false, color:'#3a5a2a' },
    tundra:    { name:'Тундра',  mult:0.65, sea:false, color:'#9a9aaa' },
    volcano:   { name:'Вулкан',  mult:0.40, sea:false, color:'#8a2a2a' },
    sea:       { name:'Море',    mult:1.00, sea:true,  color:'#2a6a8a' },
    peaks:     { name:'Непроходимые горы', mult:0.05, sea:false, block:true, color:'#4a4e5a' }
  };
  var BIOME_LIST = ['forest','mountains','plains','desert','swamp','tundra','volcano'];
  var ACCENT = { forest:'plains', plains:'forest', mountains:'forest',
                 desert:'mountains', swamp:'forest', tundra:'forest', volcano:'mountains' };

  // ── Каноничные зоны (смещения от Королевской Гавани) ──────
  // b=биом, r=радиус влияния, w=вес
  var RAW = [
    // Земли за Стеной / Вечная Зима — снег
    {ox:-1064, oy:-3117, b:'tundra', r:760, w:1.1},
    {ox:-264,  oy:-3117, b:'tundra', r:760, w:1.1},
    {ox:-664,  oy:-2817, b:'tundra', r:620, w:1.0},
    {ox:-64,   oy:-2917, b:'tundra', r:560, w:0.9},
    // Север — леса (Волчий лес) и равнины-вересковники
    {ox:-664,  oy:-1717, b:'forest', r:560, w:1.0},   // Волчий лес (запад)
    {ox:-364,  oy:-1917, b:'forest', r:520, w:0.95},
    {ox:-114,  oy:-1867, b:'plains', r:520, w:0.9},   // северные равнины
    {ox:86,    oy:-1967, b:'plains', r:480, w:0.85},
    {ox:-464,  oy:-1517, b:'forest', r:520, w:0.95},
    // Перешеек — болота (узкая талия)
    {ox:-314,  oy:-1217, b:'swamp',  r:340, w:1.3},
    {ox:-214,  oy:-1117, b:'swamp',  r:320, w:1.3},
    // Долина Аррен — горы (восток)
    {ox:286,   oy:-817,  b:'mountains', r:430, w:1.15},
    {ox:236,   oy:-617,  b:'mountains', r:430, w:1.15},
    {ox:386,   oy:-917,  b:'mountains', r:380, w:1.1},
    // Речные земли — равнины и пойменные леса (центр)
    {ox:-264,  oy:-517,  b:'plains', r:470, w:1.0},
    {ox:-114,  oy:-367,  b:'plains', r:470, w:1.0},
    {ox:-364,  oy:-367,  b:'forest', r:360, w:0.85},
    // Западные земли — горы (золото) и леса (запад)
    {ox:-664,  oy:-317,  b:'mountains', r:430, w:1.05},
    {ox:-514,  oy:-167,  b:'mountains', r:400, w:1.05},
    {ox:-414,  oy:-367,  b:'forest', r:340, w:0.85},
    {ox:-614,  oy:-67,   b:'plains', r:380, w:0.8},
    // Королевские земли — равнины + Королевский лес
    {ox:0,     oy:0,     b:'plains', r:420, w:1.0},
    {ox:116,   oy:133,   b:'forest', r:380, w:1.0},   // Королевский лес (Ю-В)
    {ox:86,    oy:-117,  b:'forest', r:300, w:0.85},  // Крабья бухта
    // Штормовые земли — дождевые леса (Ю-В)
    {ox:236,   oy:233,   b:'forest', r:470, w:1.1},   // Дождливый лес
    {ox:136,   oy:383,   b:'forest', r:430, w:1.05},
    {ox:186,   oy:-17,   b:'plains', r:320, w:0.75},  // Дорнийские марки
    // Простор — плодородные равнины (Ю-З)
    {ox:-268,  oy:264,   b:'plains', r:520, w:1.1},   // Хайгарден
    {ox:-464,  oy:433,   b:'plains', r:520, w:1.1},
    {ox:-532,  oy:792,   b:'plains', r:520, w:1.05},  // Староместье
    {ox:-664,  oy:633,   b:'plains', r:480, w:1.0},
    {ox:-214,  oy:383,   b:'forest', r:320, w:0.8},
    // Красные горы — граница Дорна (мощно, узко)
    {ox:-64,   oy:683,   b:'mountains', r:340, w:1.25},
    {ox:86,    oy:733,   b:'mountains', r:340, w:1.25},
    {ox:-214,  oy:633,   b:'mountains', r:320, w:1.2},
    // Дорн — пустыня (юг)
    {ox:-264,  oy:933,   b:'desert', r:520, w:1.15},
    {ox:-64,   oy:933,   b:'desert', r:520, w:1.15},
    {ox:-464,  oy:883,   b:'desert', r:480, w:1.1},
    {ox:86,    oy:833,   b:'desert', r:460, w:1.05},
    // Эссос — побережье (леса) и внутренние равнины + намёк на Валирию
    {ox:736,   oy:-917,  b:'forest', r:520, w:0.95},  // близ Браавоса
    {ox:886,   oy:-667,  b:'forest', r:480, w:0.9},
    {ox:1036,  oy:-367,  b:'mountains', r:430, w:0.85},
    {ox:1136,  oy:-67,   b:'plains', r:520, w:0.95},
    {ox:1036,  oy:233,   b:'plains', r:520, w:0.95},
    {ox:1186,  oy:683,   b:'volcano', r:300, w:1.2}   // Валирия (Ю-В)
  ];
  var SEEDS = RAW.map(function(s){ return { x:KLX+s.ox, y:KLY+s.oy, b:s.b, r:s.r, w:s.w }; });

  // ── Шум (value noise + fbm) ───────────────────────────────
  function makeNoise(seed) {
    var perm = []; for (var i=0;i<256;i++) perm[i]=i;
    var s = seed>>>0;
    function rnd(){ s=(s*1664525+1013904223)>>>0; return s/4294967296; }
    for (var i=255;i>0;i--){ var j=(rnd()*(i+1))|0, t=perm[i]; perm[i]=perm[j]; perm[j]=t; }
    var p = new Array(512); for (i=0;i<512;i++) p[i]=perm[i&255];
    function fade(t){ return t*t*t*(t*(t*6-15)+10); }
    function val(ix,iy){ return p[(p[ix&255]+(iy&255))&511]/255; }
    return function(x,y){
      var x0=Math.floor(x), y0=Math.floor(y);
      var fx=fade(x-x0), fy=fade(y-y0);
      var a=val(x0,y0)+ (val(x0+1,y0)-val(x0,y0))*fx;
      var b=val(x0,y0+1)+(val(x0+1,y0+1)-val(x0,y0+1))*fx;
      return a+(b-a)*fy;
    };
  }
  var nWarpA = makeNoise(1337), nWarpB = makeNoise(7919), nDet = makeNoise(4242);
  function fbm(nf,x,y,oct){ var v=0,a=0.5,f=1; for(var i=0;i<oct;i++){ v+=a*nf(x*f,y*f); f*=2; a*=0.5; } return v; }

  // ── Биом в точке суши ─────────────────────────────────────
  function biomeKey(x,y) {
    var wx = x + (nWarpA(x*0.0011, y*0.0011)-0.5)*WARP;
    var wy = y + (nWarpB(x*0.0011+5.3, y*0.0011+9.1)-0.5)*WARP;
    var inf = {};
    for (var i=0;i<SEEDS.length;i++){
      var sd=SEEDS[i], dx=wx-sd.x, dy=wy-sd.y;
      inf[sd.b]=(inf[sd.b]||0)+sd.w*Math.exp(-(dx*dx+dy*dy)/(sd.r*sd.r));
    }
    if (y < FAR_NORTH_Y)  inf.tundra = (inf.tundra||0) + 0.95*(1+(FAR_NORTH_Y-y)/600);
    if (y > DEEP_SOUTH_Y) inf.desert = (inf.desert||0) + 0.45*(1+(y-DEEP_SOUTH_Y)/500);
    var best='plains', mx=-1;
    for (var k in inf) if (inf[k]>mx){ mx=inf[k]; best=k; }
    // мелкая фактура — вкрапления вторичного биома
    var nd = fbm(nDet, x*0.004, y*0.004, 3);
    if (ACCENT[best] && nd > 0.66) best = ACCENT[best];
    return best;
  }
  // ── Ручные правки рельефа (приоритет над авто-генерацией) ──
  var EDIT_CELL = 40;
  var edits = {};
  try { var _be = localStorage.getItem('wm_biome_edits'); if (_be) edits = JSON.parse(_be); } catch(e){}
  function saveEdits(){
    try { localStorage.setItem('wm_biome_edits', JSON.stringify(edits)); } catch(e){}
    if (window._syncBiomes) window._syncBiomes(edits);   // → Firebase (центральная синхронизация)
  }
  function editKey(x,y){ return Math.floor(x/EDIT_CELL)+','+Math.floor(y/EDIT_CELL); }
  function resolvedKey(x,y){ var k = edits[editKey(x,y)]; return (k && BIOME[k]) ? k : biomeKey(x,y); }
  function biomeLandAt(x,y){ return BIOME[resolvedKey(x,y)] || BIOME.plains; }

  // ── Тест суши по береговой линии (озёра = вода) ───────────
  var _els=null, _lakes=null, _pt=null;
  function landEls(){
    if (_els) return _els;
    _els=[]; var root=document.getElementById('land');
    if (root){ var n=root.querySelectorAll('path,polygon'); for (var i=0;i<n.length;i++) if (n[i].isPointInFill) _els.push(n[i]); }
    _lakes=[]; var lk=document.getElementById('lakes');
    if (lk){ var ln=lk.querySelectorAll('path,polygon,circle,ellipse,rect'); for (var j=0;j<ln.length;j++) if (ln[j].isPointInFill) _lakes.push(ln[j]); }
    try { _pt = svg.createSVGPoint(); } catch(e){ _pt=null; }
    return _els;
  }
  function hitAny(els,x,y){ for (var i=0;i<els.length;i++){ try{ _pt.x=x; _pt.y=y; if(els[i].isPointInFill(_pt)) return true; }catch(e){} } return false; }
  function isLand(x,y){
    var els=landEls(); if(!els.length) return false;
    if(!hitAny(els,x,y)) return false;     // вне материка
    if(hitAny(_lakes,x,y)) return false;   // внутреннее озеро = вода
    return true;
  }

  // ── Слой ландшафта ────────────────────────────────────────
  var landGroup = document.getElementById('land');
  var layer = document.createElementNS(NS,'g');
  layer.setAttribute('id','terrain-layer');
  layer.setAttribute('pointer-events','none');
  layer.style.opacity = '0';
  layer.style.transition = 'opacity 0.5s';
  if (landGroup && landGroup.parentNode) landGroup.parentNode.insertBefore(layer, landGroup.nextSibling);
  else svg.appendChild(layer);

  function buildFrom(data){
    while (layer.firstChild) layer.removeChild(layer.firstChild);
    data.runs.forEach(function(r){
      var col = BIOME[BIOME_LIST[r[4]]].color;
      var rect = document.createElementNS(NS,'rect');
      rect.setAttribute('x', r[0]); rect.setAttribute('y', r[1]);
      rect.setAttribute('width', r[2]+2); rect.setAttribute('height', r[3]+2);
      rect.setAttribute('rx', 6);
      rect.setAttribute('fill', col);
      rect.setAttribute('fill-opacity', r[5]);
      layer.appendChild(rect);
    });
  }

  function generate(){
    var bb = (landGroup||svg).getBBox();
    var cell = 44;
    var x0 = Math.floor(bb.x/cell)*cell, y0 = Math.floor(bb.y/cell)*cell;
    var x1 = bb.x+bb.width, y1 = bb.y+bb.height;
    var runs = [];
    for (var y=y0; y<=y1; y+=cell){
      var runStart=null, runKey=-1;
      for (var x=x0; x<=x1+cell; x+=cell){
        var cx=x+cell/2, cy=y+cell/2;
        var ki = (x<=x1 && isLand(cx,cy)) ? BIOME_LIST.indexOf(biomeKey(cx,cy)) : -1;
        if (ki !== runKey){
          if (runKey>=0){
            var op = +(0.40 + 0.18*fbm(nDet, runStart*0.003, y*0.003, 2)).toFixed(2);
            runs.push([runStart, y, x-runStart, cell, runKey, op]);
          }
          runStart=x; runKey=ki;
        }
      }
    }
    return { v:VERSION, cell:cell, runs:runs };
  }

  // Наложение ручных правок (рисуется поверх авто-биомов)
  var editsG = null;
  function renderEdits(){
    if (!editsG){
      editsG = document.createElementNS(NS,'g');
      editsG.setAttribute('id','terrain-edits');
    }
    if (editsG.parentNode !== layer) layer.appendChild(editsG); // всегда сверху
    while (editsG.firstChild) editsG.removeChild(editsG.firstChild);
    for (var k in edits){
      var key = edits[k]; if (!BIOME[key]) continue;
      var p = k.split(','), gx=+p[0], gy=+p[1];
      var rect = document.createElementNS(NS,'rect');
      rect.setAttribute('x', gx*EDIT_CELL); rect.setAttribute('y', gy*EDIT_CELL);
      rect.setAttribute('width', EDIT_CELL+1); rect.setAttribute('height', EDIT_CELL+1);
      rect.setAttribute('rx', 4);
      rect.setAttribute('fill', BIOME[key].color);
      rect.setAttribute('fill-opacity', 0.8);
      editsG.appendChild(rect);
    }
  }

  var _generated = false;
  function ensure(){
    if (!_generated){
      var data=null;
      try { var s=localStorage.getItem('wm_biomes'); if(s){ var d=JSON.parse(s); if(d && d.v===VERSION) data=d; } } catch(e){}
      if (!data){ data=generate(); try{ localStorage.setItem('wm_biomes', JSON.stringify(data)); }catch(e){} }
      buildFrom(data);
      _generated = true;
    }
    renderEdits();
  }

  // ── Кнопка-тумблер + легенда ──────────────────────────────
  var css = document.createElement('style');
  css.textContent =
    '#terrain-btn{position:fixed;bottom:194px;right:16px;z-index:200;width:38px;height:38px;'
    +'background:rgba(10,20,35,0.88);border:1px solid #2a4060;border-radius:50%;color:#3a5a7a;'
    +'font-size:1.15em;cursor:pointer;display:flex;align-items:center;justify-content:center;'
    +'transition:border-color .18s,color .18s,background .18s;padding:0}'
    +'#terrain-btn:hover{border-color:#6aa86a;color:#9ad99a;background:rgba(18,40,28,0.97)}'
    +'#terrain-btn.active{background:rgba(20,55,30,0.95);border-color:#6ad06a;color:#aef0ae;box-shadow:0 0 8px 2px rgba(60,180,80,0.4)}'
    +'#terrain-legend{position:fixed;top:60px;left:18px;z-index:200;display:none;'
    +'background:rgba(10,16,12,0.92);border:1px solid #3a5030;border-radius:8px;padding:9px 12px;'
    +'font-family:Georgia,serif;font-size:0.8em;color:#cfe0c4;box-shadow:0 4px 16px rgba(0,0,0,0.5)}'
    +'#terrain-legend.show{display:block}'
    +'#terrain-legend .lg-title{color:#9ad99a;font-size:0.92em;margin-bottom:5px}'
    +'#terrain-legend .lg-row{display:flex;align-items:center;gap:6px;padding:1px 0}'
    +'#terrain-legend .lg-sw{width:13px;height:13px;border-radius:3px;border:1px solid rgba(255,255,255,0.25)}'
    +'#terrain-paint-hint{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:600;display:none;'
    +'align-items:center;gap:14px;background:rgba(10,16,12,0.95);border:1px solid #6ad06a;border-radius:9px;'
    +'padding:9px 16px;font-family:Georgia,serif;font-size:0.9em;color:#cfe0c4;box-shadow:0 6px 22px rgba(0,0,0,0.6)}'
    +'#terrain-paint-hint.show{display:flex}'
    +'#terrain-paint-hint b{color:#aef0ae}'
    +'#tp-done{background:#2f6a35;border:1px solid #6ad06a;color:#dfffd6;padding:5px 14px;border-radius:6px;cursor:pointer;font-family:Georgia,serif}'
    +'#tp-done:hover{filter:brightness(1.15)}'
    +'body.terrain-paint #map-wrap{cursor:crosshair !important}'
    +'body.terrain-paint #admin-panel{display:none}';
  document.head.appendChild(css);

  document.body.insertAdjacentHTML('beforeend',
    '<button id="terrain-btn" title="Ландшафт (биомы)">⛰</button>');
  var legend = document.createElement('div');
  legend.id = 'terrain-legend';
  legend.innerHTML = '<div class="lg-title">Ландшафт</div>' +
    ['plains','forest','mountains','swamp','desert','tundra','volcano'].map(function(k){
      return '<div class="lg-row"><span class="lg-sw" style="background:'+BIOME[k].color+'"></span>'+BIOME[k].name+'</div>';
    }).join('');
  document.body.appendChild(legend);

  var btn = document.getElementById('terrain-btn');
  var on = false;
  function setOn(v){
    on = v;
    btn.classList.toggle('active', on);
    legend.classList.toggle('show', on);
    if (on){
      btn.textContent='…';
      setTimeout(function(){ ensure(); layer.style.opacity='1'; btn.textContent='⛰'; }, 16);
    } else {
      layer.style.opacity='0';
    }
  }
  btn.addEventListener('click', function(){ setOn(!on); });

  // ── Кисть рельефа ─────────────────────────────────────────
  var paintMode = false, painting = false, paintBiome = 'forest', paintBrush = 80;
  var mapWrap = document.getElementById('map-wrap');
  var brushCursor = document.createElementNS(NS,'circle');
  brushCursor.setAttribute('fill','none'); brushCursor.setAttribute('stroke','#fff');
  brushCursor.setAttribute('stroke-width','2'); brushCursor.setAttribute('stroke-dasharray','6,6');
  brushCursor.setAttribute('pointer-events','none'); brushCursor.style.display='none';

  // подсказка
  document.body.insertAdjacentHTML('beforeend',
    '<div id="terrain-paint-hint"><span>✏ Рисуйте биом: <b id="tp-biome-name">Лес</b> · ЛКМ — кисть · ESC — выход</span>'
    + '<button id="tp-done">✓ Готово</button></div>');
  var paintHint = document.getElementById('terrain-paint-hint');

  function evToSvg(e){
    var r = mapWrap.getBoundingClientRect(), sc = (typeof getScale==='function'?getScale():1);
    return [ vx + (e.clientX - r.left)/sc, vy + (e.clientY - r.top)/sc ];
  }
  function paintAt(x,y){
    var rCells = Math.ceil(paintBrush/EDIT_CELL);
    var cgx = Math.floor(x/EDIT_CELL), cgy = Math.floor(y/EDIT_CELL), changed=false;
    for (var dx=-rCells; dx<=rCells; dx++){
      for (var dy=-rCells; dy<=rCells; dy++){
        var gx=cgx+dx, gy=cgy+dy;
        var px=gx*EDIT_CELL+EDIT_CELL/2, py=gy*EDIT_CELL+EDIT_CELL/2;
        if (Math.hypot(px-x,py-y) > paintBrush) continue;
        // рисуем по всей карте (включая море)
        var k = gx+','+gy;
        if (paintBiome==='auto'){ if (edits[k]!==undefined){ delete edits[k]; changed=true; } }
        else if (edits[k]!==paintBiome){ edits[k]=paintBiome; changed=true; }
      }
    }
    if (changed) renderEdits();
  }
  function moveBrush(e){
    var p = evToSvg(e);
    brushCursor.setAttribute('cx', p[0]); brushCursor.setAttribute('cy', p[1]);
    brushCursor.setAttribute('r', paintBrush);
  }
  mapWrap.addEventListener('mousedown', function(e){
    if (!paintMode || e.button!==0) return;
    e.preventDefault(); painting=true;
    var p=evToSvg(e); paintAt(p[0],p[1]);
  });
  window.addEventListener('mousemove', function(e){
    if (!paintMode) return;
    moveBrush(e);
    if (painting){ var p=evToSvg(e); paintAt(p[0],p[1]); }
  });
  window.addEventListener('mouseup', function(){ if (painting){ painting=false; saveEdits(); } });

  function enterPaint(){
    paintMode=true; window._terrainPaintMode=true;
    setOn(true);
    if (brushCursor.parentNode!==layer) layer.appendChild(brushCursor);
    brushCursor.style.display='';
    document.body.classList.add('terrain-paint');
    paintHint.classList.add('show');
    document.getElementById('tp-biome-name').textContent = (BIOME[paintBiome]||{name:'Авто'}).name || 'Авто';
  }
  function exitPaint(){
    paintMode=false; painting=false; window._terrainPaintMode=false;
    saveEdits();
    brushCursor.style.display='none';
    document.body.classList.remove('terrain-paint');
    paintHint.classList.remove('show');
  }
  document.getElementById('tp-done').addEventListener('click', exitPaint);
  document.addEventListener('keydown', function(e){ if (e.key==='Escape' && paintMode) exitPaint(); });

  // экспорт для движения войск и редактора рельефа
  window.WarTerrain = {
    biomeLandAt: biomeLandAt, biomeKey: biomeKey, resolvedKey: resolvedKey,
    // ручная правка в точке (если есть) — приоритетна и работает по всей карте, в т.ч. над морем
    editOverride: function(x,y){ var k = edits[editKey(x,y)]; return (k && BIOME[k]) ? BIOME[k] : null; },
    regenerate: function(){ _generated=false; try{localStorage.removeItem('wm_biomes');}catch(e){} setOn(true); },
    setShown: function(v){ setOn(v); },
    setPaintBiome: function(k){ paintBiome=k; var el=document.getElementById('tp-biome-name'); if(el) el.textContent=(k==='auto'?'Ластик':(BIOME[k]||{name:'Авто'}).name); },
    setBrush: function(px){ paintBrush=+px||80; },
    enterPaint: enterPaint, exitPaint: exitPaint,
    isPainting: function(){ return paintMode; },
    clearEdits: function(){ edits={}; saveEdits(); renderEdits(); },
    editCount: function(){ return Object.keys(edits).length; },
    // применить правки, пришедшие из Firebase (без обратной отправки)
    applyEdits: function(obj){
      edits = obj || {};
      try { localStorage.setItem('wm_biome_edits', JSON.stringify(edits)); } catch(e){}
      renderEdits();
    }
  };
})();
</script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
(function () {
  // ▼ ВСТАВЬ СВОЙ КОНФИГ СЮДА ▼
  var firebaseConfig = {
    apiKey:            "AIzaSyAj_Y3_aZ44A4F2IrAQHZChD6AFvs7W1hk",
    authDomain:        "warmapsb.firebaseapp.com",
    databaseURL:       "https://warmapsb-default-rtdb.firebaseio.com",
    projectId:         "warmapsb",
    storageBucket:     "warmapsb.firebasestorage.app",
    messagingSenderId: "400144743487",
    appId:             "1:400144743487:web:29814c199ec57fc7aecc8a"
  };
  // ▲ ──────────────────────── ▲

  if (!firebaseConfig.databaseURL) {
    console.warn('[Sync] Firebase не настроен (databaseURL пуст)');
    return;
  }

  firebase.initializeApp(firebaseConfig);
  var db        = firebase.database();
  // ИЗОЛЯЦИЯ ВЕРСИИ: новая версия живёт в отдельной ветке базы, чтобы старые
  // открытые копии (которые пишут в westeros*) физически не могли портить данные.
  var ROOT      = 'westerosV2';
  var mapRef    = db.ref(ROOT+'/map');           // города/символы/дороги/тайлы/подписи
  var troopsRef = db.ref(ROOT+'/troops');        // войска
  var biomesRef = db.ref(ROOT+'/biomes');        // ручные правки рельефа
  var warRef    = db.ref(ROOT+'/war');           // экономика/тарифы/пароли/логи
  var battlesRef= db.ref(ROOT+'/battles');       // объявленные битвы

  // ── Значок статуса подключения ──────────────────────────
  var badge = document.createElement('div');
  badge.style.cssText = 'position:fixed;bottom:60px;right:16px;z-index:9999;' +
    'font-size:0.72em;padding:3px 9px;border-radius:10px;pointer-events:none;' +
    'background:rgba(8,16,28,0.88);border:1px solid #2a4060;' +
    'color:#6a8aaa;font-family:Georgia,serif;transition:color 0.3s';
  badge.textContent = '⟳ подключение…';
  document.body.appendChild(badge);

  db.ref('.info/connected').on('value', function (s) {
    badge.textContent = s.val() ? '● синхронизация' : '○ офлайн';
    badge.style.color  = s.val() ? '#5cb85c'        : '#c0392b';
  });

  // ── Анти-эхо: пока мы сами пишем ветку, игнорируем её обновления ──
  var writing = {};
  function guard(key) {
    writing[key] = true;
    clearTimeout(guard['_t_' + key]);
    guard['_t_' + key] = setTimeout(function () { writing[key] = false; }, 1500);
  }
  function lsGet(k){ try { var s=localStorage.getItem(k); return s?JSON.parse(s):null; } catch(e){ return null; } }
  function lsSet(k,v){ try { localStorage.setItem(k, JSON.stringify(v)); } catch(e){} }
  function asArray(v){ // Firebase отдаёт разреженный массив как объект — нормализуем
    if (Array.isArray(v)) return v;
    if (v && typeof v === 'object') return Object.keys(v).map(function(k){return v[k];}).filter(function(x){return x!=null;});
    return [];
  }

  // ════════════ ИСХОДЯЩАЯ СИНХРОНИЗАЦИЯ ════════════
  var _origPersist = window._persistMap;
  window._persistMap = function () {
    _origPersist && _origPersist();              // localStorage как раньше
    guard('map');
    mapRef.set({
      cities:        window.citiesData   || [],
      terrain:       window.terrainData  || [],
      roads:         window.roadsData    || [],
      tiles:         window.tilesData    || [],
      label_offsets: window.labelOffsets || {}
    }).catch(function (e) { console.warn('[Sync] map:', e); });
  };

  window._syncTroops = function () {
    guard('troops');
    troopsRef.set(window.troopsData || []).catch(function (e) { console.warn('[Sync] troops:', e); });
  };

  window._syncBiomes = function (edits) {
    guard('biomes');
    biomesRef.set(edits || {}).catch(function (e) { console.warn('[Sync] biomes:', e); });
  };

  window._syncBattles = function () {
    guard('battles');
    battlesRef.set(window.battlesData || []).catch(function (e) { console.warn('[Sync] battles:', e); });
  };

  var WAR_KEYS = { econ:'wm_war_econ', rates:'wm_war_rates', passwords:'wm_war_passwords', actions:'wm_war_actions', logins:'wm_war_logins' };
  window._syncWar = function (which) {
    guard('war');
    if (which && WAR_KEYS[which]) {
      warRef.child(which).set(lsGet(WAR_KEYS[which]) || {}).catch(function (e) { console.warn('[Sync] war/'+which+':', e); });
    } else {
      var blob = {}; Object.keys(WAR_KEYS).forEach(function (k) { blob[k] = lsGet(WAR_KEYS[k]) || {}; });
      warRef.update(blob).catch(function (e) { console.warn('[Sync] war:', e); });
    }
  };

  // ════════════ ВХОДЯЩАЯ СИНХРОНИЗАЦИЯ ════════════
  // ── Карта (города/символы/дороги/тайлы/подписи) ──
  var _initMap = false;
  mapRef.on('value', function (snap) {
    if (writing.map) return;
    var data = snap.val();
    if (!_initMap) {
      _initMap = true;
      if (!data) { window._persistMap(); return; }   // пустая БД — засеять из локали
    }
    if (!data) return;
    if (data.cities)        window.citiesData   = data.cities;
    if (data.terrain)       window.terrainData  = data.terrain;
    if (data.roads)         window.roadsData    = data.roads;
    if (data.tiles)         window.tilesData    = data.tiles;
    if (data.label_offsets) window.labelOffsets = data.label_offsets;
    lsSet('wm_cities', window.citiesData);   lsSet('wm_terrain', window.terrainData);
    lsSet('wm_roads', window.roadsData);     lsSet('wm_tiles', window.tilesData);
    lsSet('wm_label_offsets', window.labelOffsets);
    rerenderMap();
  });

  // ── Войска ──
  var _initTroops = false;
  troopsRef.on('value', function (snap) {
    if (writing.troops) return;
    var data = snap.val();
    if (!_initTroops) {
      _initTroops = true;
      if (data == null) { if ((window.troopsData||[]).length) window._syncTroops(); return; }
    }
    window.troopsData = asArray(data);
    lsSet('wm_troops', window.troopsData);
    if (window.renderTroops) window.renderTroops();
    if (window.renderHUD)    window.renderHUD();
  });

  // ── Биомы (ручные правки рельефа) ──
  var _initBiomes = false;
  biomesRef.on('value', function (snap) {
    if (writing.biomes) return;
    var data = snap.val();
    if (!_initBiomes) {
      _initBiomes = true;
      if (data == null) { var loc = lsGet('wm_biome_edits'); if (loc && Object.keys(loc).length) window._syncBiomes(loc); return; }
    }
    var edits = data || {};
    lsSet('wm_biome_edits', edits);
    if (window.WarTerrain && window.WarTerrain.applyEdits) window.WarTerrain.applyEdits(edits);
  });

  // ── Битвы ──
  var _initBattles = false, _knownBattles = {};
  battlesRef.on('value', function (snap) {
    if (writing.battles) return;
    var data = snap.val();
    var arr = asArray(data);
    var firstLoad = !_initBattles;
    var s = window._warSession;
    arr.forEach(function (b) {
      if (b && b.id && !_knownBattles[b.id]) {
        _knownBattles[b.id] = true;
        if (!firstLoad && s && !s.isAdmin && b.defenderFaction === s.faction && window._warToast)
          window._warToast('⚔ На ваше войско «' + b.defenderTroopName + '» объявлена битва!');
      }
    });
    if (firstLoad) {
      _initBattles = true;
      if (data == null) { if ((window.battlesData||[]).length) window._syncBattles(); return; }
    }
    window.battlesData = arr;
    lsSet('wm_battles', window.battlesData);
    if (window.renderBattles) window.renderBattles();
  });

  // ── Военное состояние (экономика/тарифы/пароли/логи) ──
  var _initWar = false;
  warRef.on('value', function (snap) {
    if (writing.war) return;
    var data = snap.val();
    if (!_initWar) {
      _initWar = true;
      if (data == null) {
        var hasLocal = Object.keys(WAR_KEYS).some(function (k) { var v = lsGet(WAR_KEYS[k]); return v && Object.keys(v).length; });
        if (hasLocal) window._syncWar();
        return;
      }
    }
    if (!data) return;
    Object.keys(WAR_KEYS).forEach(function (k) { if (data[k] != null) lsSet(WAR_KEYS[k], data[k]); });
    if (window.renderHUD) window.renderHUD();
  });

  function rerenderMap() {
    if (window.renderCities)  window.renderCities();
    if (window.renderTerrain) window.renderTerrain();
    if (window.renderRoads)   window.renderRoads();
    if (window._renderEndpointHandles) window._renderEndpointHandles();
    if (window.renderTiles)   window.renderTiles();
    if (window.updateTilesVisibility) window.updateTilesVisibility();
    if (window.updateRoadsVisibility) window.updateRoadsVisibility();
    if (window.labelOffsets && window._labelsG) {
      Object.keys(window.labelOffsets).forEach(function (id) {
        var lg = window._labelsG.querySelector('[data-label-id="' + id + '"]');
        if (lg) { var off = window.labelOffsets[id]; lg.setAttribute('transform', 'translate(' + off.dx + ',' + off.dy + ')'); }
      });
    }
  }
})();
</script>
